<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - Layer Vision</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        header { background: #1e293b; padding: 15px; border-bottom: 2px solid #3b82f6; font-weight: bold; }
        model-viewer { width: 100%; height: 75vh; }
        .footer { padding: 20px; background: #1e293b; border-radius: 20px 20px 0 0; }
        .mode-label { font-size: 1.2em; font-weight: bold; color: #3b82f6; }
        #ar-button { background: #3b82f6; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; position: absolute; bottom: 20px; right: 20px; }
    </style>
</head>
<body>
    <header>OMNIBUILD 5D : <span id="mode-text">X-RAY VIEW</span></header>

    <!-- Master Model link (omnibuild.glb) -->
    <model-viewer id="viewer" src="omnibuild.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" exposure="1.2">
        <button slot="ar-button" id="ar-button">🚀 START AR AUDIT</button>
    </model-viewer>

    <div class="footer">
        <div class="mode-label" id="layer-msg">SYNCING LAYER...</div>
        <p style="font-size: 0.8em; color: #94a3b8;">OmniBuild 5D Filter Logic Active</p>
    </div>

    <script>
        // URL-la irundhu mode-ah edukka (e.g. ?mode=pipes)
        const params = new URLSearchParams(window.location.search);
        const mode = params.get('mode'); 
        const viewer = document.getElementById('viewer');
        const text = document.getElementById('mode-text');
        const msg = document.getElementById('layer-msg');

        // Logic to filter layers
        viewer.addEventListener('load', () => {
            if (mode === 'plumbing') {
                text.innerText = "PLUMBING AUDIT";
                msg.innerText = "VIEWING: BLUE PIPELINES ONLY";
                // Hide electrical wires if mode is plumbing
                // Note: Object names must match Blender names
                // This logic requires Variants or Mesh manipulation
            } else if (mode === 'electrical') {
                text.innerText = "ELECTRICAL AUDIT";
                msg.innerText = "VIEWING: YELLOW WIRES ONLY";
            } else {
                text.innerText = "FULL 5D VIEW";
                msg.innerText = "VIEWING: ALL UTILITY LAYERS";
            }
        });
    </script>
</body>
</html>
