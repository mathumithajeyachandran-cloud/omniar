<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D v2 - Field Worker Portal</title>
    <!-- Google Model Viewer Library -->
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    
    <style>
        body { margin: 0; background-color: #0f172a; color: white; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        
        header { 
            background: #1e293b; padding: 15px; text-align: center; 
            border-bottom: 2px solid #3b82f6; font-weight: bold; letter-spacing: 1px;
        }

        /* AR Viewer Container */
        model-viewer {
            width: 100%;
            height: 75vh;
            background-color: #000;
            --poster-color: transparent;
        }

        /* 5D UI Overlay */
        .ui-overlay {
            padding: 20px;
            background: #1e293b;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -5px 15px rgba(0,0,0,0.3);
            text-align: center;
        }

        .status-badge {
            background: #059669; color: white; padding: 5px 15px; 
            border-radius: 20px; font-size: 0.8em; font-weight: bold;
        }

        .instruction { font-size: 0.9em; color: #94a3b8; margin: 10px 0; }

        /* Professional AR Button */
        #ar-button {
            background: #3b82f6; color: white; border: none;
            padding: 12px 25px; border-radius: 10px; font-weight: bold;
            font-size: 1em; cursor: pointer; box-shadow: 0 4px 10px rgba(59,130,246,0.5);
            position: absolute; bottom: 20px; right: 20px;
        }

        .legend { display: flex; justify-content: center; gap: 15px; font-size: 0.8em; margin-top: 10px; }
        .dot { height: 10px; width: 10px; border-radius: 50%; display: inline-block; }
    </style>
</head>
<body>

    <header>🏗️ OMNIBUILD 5D : X-RAY VISION</header>

    <!-- 
        IMPORTANT: src-la unga pudhu file name 'omnibuild.glb' 
        correct-ah link aagi irukku 
    -->
    <model-viewer 
        src="omnibuild.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        exposure="1.2" 
        auto-rotate>
        
        <button slot="ar-button" id="ar-button">
            🚀 START SITE AUDIT
        </button>

    </model-viewer>

    <div class="ui-overlay">
        <span class="status-badge">✅ 5D BIM DATA SYNCED</span>
        <p class="instruction">Scan Project QR Code to lock 3D model to floor coordinates.</p>
        
        <div class="legend">
            <div><span class="dot" style="background: #3b82f6;"></span> Blue Pipeline</div>
            <div><span class="dot" style="background: #eab308;"></span> Electrical Line</div>
            <div><span class="dot" style="background: #64748b;"></span> Hatched Wall</div>
        </div>

        <button onclick="alert('Report Sent: Alignment Mismatch Logged at Firebase.')" 
                style="margin-top: 15px; background: transparent; border: 1px solid #ef4444; color: #ef4444; padding: 5px 15px; border-radius: 5px; cursor: pointer;">
            ⚠️ Report Alignment Error
        </button>
    </div>

</body>
</html>
