<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - Worker AR</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; }
        header { background: #1e293b; padding: 15px; text-align: center; border-bottom: 2px solid #3b82f6; font-weight: bold; }
        model-viewer { width: 100%; height: 75vh; }
        .ui-overlay { padding: 20px; background: #1e293b; border-radius: 20px 20px 0 0; text-align: center; }
        #ar-button { background: #3b82f6; color: white; border: none; padding: 12px 25px; border-radius: 10px; font-weight: bold; position: absolute; bottom: 20px; right: 20px; }
    </style>
</head>
<body>
    <header>OMNIBUILD 5D : SITE VISION</header>
    <model-viewer src="omnibuild.glb" ar ar-modes="webxr scene-viewer quick-look" camera-controls shadow-intensity="1" exposure="1.2">
        <button slot="ar-button" id="ar-button">🚀 START AR AUDIT</button>
    </model-viewer>
    <div class="ui-overlay">
        <div style="background:#059669; display:inline-block; padding:5px 15px; border-radius:20px; font-size:0.8em;">✅ 5D BIM DATA SYNCED</div>
        <p>Scan Site QR to align Digital Twin with real walls.</p>
    </div>
</body>
</html>
