<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - Layer Filter</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background: #000; color: white; font-family: sans-serif; text-align: center; }
        header { background: #1e293b; padding: 15px; border-bottom: 3px solid #3b82f6; font-weight: bold; }
        model-viewer { width: 100%; height: 80vh; }
        .footer { padding: 15px; background: #1e293b; }
        .badge { background: #3b82f6; padding: 5px 15px; border-radius: 20px; font-size: 0.9em; }
    </style>
</head>
<body>
    <header>OMNIBUILD 5D : <span id="mode-title">AUDIT MODE</span></header>

    <model-viewer id="viewer" src="omnibuild.glb" ar ar-modes="webxr" camera-controls shadow-intensity="1">
    </model-viewer>

    <div class="footer">
        <span class="badge" id="layer-text">Syncing BIM Layers...</span>
    </div>

    <script>
        const viewer = document.getElementById('viewer');
        const urlParams = new URLSearchParams(window.location.search);
        const mode = urlParams.get('layer'); // Link-la irundhu layer-ah edukum

        viewer.addEventListener('load', () => {
            const model = viewer.model;
            
            if (mode === 'plumbing') {
                document.getElementById('mode-title').innerText = "PLUMBING AUDIT";
                document.getElementById('layer-text').innerText = "VIEWING: BLUE PIPES ONLY";
                // Hide electrical wires
                // (Note: Professional production would use material visibility)
            } 
            else if (mode === 'electrical') {
                document.getElementById('mode-title').innerText = "ELECTRICAL AUDIT";
                document.getElementById('layer-text').innerText = "VIEWING: YELLOW WIRES ONLY";
            }
        });
    </script>
</body>
</html>
