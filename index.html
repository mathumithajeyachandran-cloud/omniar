<!DOCTYPE html>
<html>
<head>
    <title>OmniSite AI: Hybrid BIM</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.5.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #222222; overflow: hidden; }
        model-viewer { width: 100%; height: 100vh; }
        #ar-button {
            background-color: #007bff; color: white; border: none; 
            padding: 15px 30px; border-radius: 30px; 
            position: absolute; bottom: 30px; left: 50%; 
            transform: translateX(-50%); font-weight: bold; font-family: sans-serif;
            box-shadow: 0px 4px 10px rgba(0,0,0,0.5); z-index: 10; cursor: pointer;
        }
    </style>
</head>
<body>

    <!-- Ippo 'omnise.glb' nu filename-ah mathirukaen -->
    <model-viewer 
        src="omnise.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate 
        interaction-prompt="auto">
        
        <button slot="ar-button" id="ar-button">🚀 START X-RAY VIEW</button>
        
    </model-viewer>

</body>
</html>
