<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - Smart Construction Hub</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0f172a; color: white; text-align: center; }
        header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 60px 20px; border-bottom: 3px solid #3b82f6; }
        h1 { font-size: 3em; margin: 0; letter-spacing: 2px; color: #3b82f6; }
        p { color: #94a3b8; font-size: 1.1em; }
        .container { max-width: 1000px; margin: 50px auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; }
        .card { background: #1e293b; padding: 40px; border-radius: 20px; border: 1px solid #334155; transition: 0.4s; cursor: pointer; text-decoration: none; color: inherit; display: block; }
        .card:hover { transform: translateY(-15px); border-color: #3b82f6; box-shadow: 0 10px 30px rgba(59,130,246,0.2); }
        .card h2 { color: #3b82f6; }
        .btn { display: inline-block; margin-top: 25px; padding: 12px 30px; background: #3b82f6; color: white; border-radius: 30px; font-weight: bold; }
        footer { margin-top: 100px; padding: 30px; color: #64748b; font-size: 0.85em; }
    </style>
</head>
<body>
    <header>
        <h1>OMNIBUILD 5D</h1>
        <p>Hybrid BIM Platform | AI Progress Tracking | WebAR Vision</p>
    </header>
    <div class="container">
        <div class="grid">
            <a href="ar_view.html" class="card">
                <h2>Worker Portal</h2>
                <p>On-site X-Ray vision for hidden utility pipelines using WebAR.</p>
                <span class="btn">Launch AR Audit</span>
            </a>
            <a href="dashboard.html" class="card">
                <h2>Project Dashboard</h2>
                <p>Real-time "Planned vs Actual" progress and cost analytics.</p>
                <span class="btn">Open HD Dashboard</span>
            </a>
        </div>
    </div>
    <footer>© 2025 OmniBuild 5D System</footer>
</body>
</html>
