<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D Pro - Precision Hub</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* MEGA JUMBO HD STYLE */
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0b1120; color: white; overflow-x: hidden; text-align: center; padding-bottom: 220px; }
        .page { display: none; width: 100vw; min-height: 100vh; position: absolute; top: 0; left: 0; overflow-y: auto; }
        .active { display: block; }
        header { background: #1e293b; padding: 50px; border-bottom: 10px solid #3b82f6; font-size: 3.5em; font-weight: 900; color: #3b82f6; text-transform: uppercase; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 40px; }

        /* JUMBO HOTSPOT STYLING */
        .hotspot { background: #3b82f6; border-radius: 50%; width: 45px; height: 45px; border: 4px solid white; cursor: pointer; box-shadow: 0 0 30px #3b82f6; }
        .annotation { 
            background: white; color: #0b1120; padding: 25px; border-radius: 25px; 
            font-size: 1.8em; font-weight: 900; position: absolute; width: 420px; 
            transform: translate(40px, -40px); display: none; text-align: left; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-left: 20px solid #3b82f6; 
        }
        .hotspot:hover .annotation { display: block; }

        /* REPORTS & JUMBO UI */
        .perc-display { font-size: 10em; font-weight: 900; color: #10b981; margin: 40px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 40px; }
        .stat-card { padding: 35px; background: #1e293b; border-radius: 30px; border-bottom: 10px solid #3b82f6; }
        .chart-box { background: white !important; padding: 50px; border-radius: 50px; height: 750px; margin-top: 60px; }
        .history-item { background: #1e293b; padding: 40px; border-radius: 40px; margin-bottom: 25px; text-align: left; border: 1px solid #334155; border-left: 20px solid #10b981; font-size: 1.8em; }

        /* JUMBO BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 180px; background: #111827; display: flex; justify-content: space-around; align-items: center; border-top: 10px solid #3b82f6; z-index: 1000; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 1.8em; font-weight: 900; flex: 1; cursor: pointer; }
        .active-nav { color: #3b82f6; background: rgba(59,130,246,0.1); }
        .nav-icon { font-size: 80px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- HOME HUB -->
    <div id="home" class="page active">
        <header>OMNIBUILD 5D</header>
        <div class="container">
            <div style="background: rgba(59, 130, 246, 0.1); padding: 80px 40px; border-radius: 60px; border: 8px dashed #3b82f6; margin-bottom: 50px;">
                <button onclick="window.open('https://huggingface.co/spaces/mathusugi/omnibuild-5d-ai')" style="background: #3b82f6; color: white; border: none; padding: 35px 100px; border-radius: 120px; font-weight: 900; font-size: 2.5em; cursor: pointer;">🚀 LAUNCH SITE AUDIT</button>
            </div>
            <div style="background: #1e293b; padding: 60px; border-radius: 50px; margin-bottom: 30px; cursor: pointer; border-left: 20px solid #3b82f6;" onclick="showPage('ar-view')"><h2>🛡️ LAUNCH AR VISION</h2></div>
            <div style="background: #1e293b; padding: 60px; border-radius: 50px; cursor: pointer; border-left: 20px solid #3b82f6;" onclick="showPage('dashboard')"><h2>📈 VIEW REPORTS</h2></div>
        </div>
    </div>

    <!-- AR VIEW (With Edge Measurement Logic) -->
    <div id="ar-view" class="page">
        <header>🛡️ PRECISION AUDIT</header>
        <model-viewer src="omnibuild.glb" ar camera-controls exposure="1.2" style="width:100%; height:80vh; background:#000;">
            
            <!-- 🔵 PIPE HOTSPOT -->
            <button class="hotspot" slot="hotspot-pipe" data-position="6m 3m 1.2m" data-normal="0m 1m 0m">
                <div class="annotation" id="ar-pipe-label">📏 Fetching Precision Data...</div>
            </button>

            <!-- 🟡 ELECTRICAL HOTSPOT -->
            <button class="hotspot" slot="hotspot-elec" data-position="0m 3m 2.4m" data-normal="0m 1m 0m">
                <div class="annotation" id="ar-elec-label">⚡ Fetching Precision Data...</div>
            </button>

        </model-viewer>
        <div style="background:#1e293b; padding:30px; border-radius:30px 30px 0 0; margin-top:-20px;"><p style="font-size:1.8em; font-weight:900;">BIM STANDARD: <span style="color:#10b981;">OFFSETS SYNCED</span></p></div>
    </div>

    <!-- REPORTS PAGE -->
    <div id="dashboard" class="page">
        <header>📈 5D REPORTS</header>
        <div class="container">
            <div id="perc" class="perc-display">0%</div>
            <div class="stats-grid">
                <div class="stat-card"><strong>Planned Finish</strong><span id="plan">-- --</span></div>
                <div class="stat-card"><strong>Current Audit</strong><span id="act">-- --</span></div>
                <div class="stat-card" style="border-color:#f59e0b; color:#f59e0b;"><strong>AI Forecast</strong><span id="eta">TBD</span></div>
            </div>
            <div class="chart-box"><canvas id="ultraHDChart"></canvas></div>
            <h2 style="font-size:4em; margin-top:100px; text-align:left;">📜 AUDIT HISTORY LOG</h2>
            <div id="audit-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="showPage('home')" id="nav-home" class="nav-item active-nav"><span class="nav-icon">🏠</span>HOME</div>
        <div onclick="showPage('ar-view')" id="nav-ar" class="nav-item"><span class="nav-icon">🛡️</span>AR SITE</div>
        <div onclick="showPage('dashboard')" id="nav-dash" class="nav-item"><span class="nav-icon">📉</span>REPORTS</div>
    </nav>

<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(pId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(pId).classList.add('active');
        const nId = pId === 'home'?'nav-home': pId === 'ar-view'?'nav-ar':'nav-dash';
        document.getElementById(nId).classList.add('active-nav');
        window.scrollTo(0,0);
    }

    const ctx = document.getElementById('ultraHDChart').getContext('2d');
    let ultraHDChart = new Chart(ctx, { type: 'bar', data: { labels: ['PLANNED (2026)', 'ACTUAL STATE (%)'], datasets: [{ data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'], barThickness: 250, borderRadius: 25 }] }, options: { responsive: true, maintainAspectRatio: false, devicePixelRatio: 4, scales: { y: { ticks: { font: { size: 30, weight: 'bold' } } }, x: { ticks: { font: { size: 35, weight: '900' } } } } } });

    // --- 📏 DYNAMIC PRECISION LOGIC (NEENGA KETTA PART) ---
    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('perc').innerText = d.percentage + '%';
            document.getElementById('plan').innerText = d.planned_date || '-- --';
            document.getElementById('act').innerText = d.actual_date || '-- --';
            document.getElementById('eta').innerText = d.predicted_date || '...';
            
            // 🚀 AUTOMATIC UPDATING OF DISTANCE FROM RIGHT EDGE
            document.getElementById('ar-pipe-label').innerHTML = `
                🛠️ <b>PLUMBING AUDIT</b><br>
                ⬅️ <b>Dist. from Right Edge: ${d.p_offset || '2.50m'}</b><br>
                ⬆️ Installation Height: ${d.p_h || '1.20m'}
            `;

            document.getElementById('ar-elec-label').innerHTML = `
                ⚡ <b>ELECTRICAL AUDIT</b><br>
                ⬅️ <b>Dist. from Right Edge: ${d.e_offset || '1.80m'}</b><br>
                ⬆️ Installation Height: 2.40m
            `;

            ultraHDChart.data.datasets[0].data = [100, d.percentage]; ultraHDChart.update();
        }
    });

    db.ref('audit_history').on('value', (snap) => {
        const logs = snap.val();
        let html = "";
        if (logs) {
            Object.keys(logs).reverse().forEach(k => {
                const item = logs[k];
                html += `<div class="history-item">DATE: ${item.timestamp} <br> <strong>Result: ${item.percentage}% Completion</strong></div>`;
            });
        }
        document.getElementById('audit-list').innerHTML = html;
    });
</script>
</body>
</html>
