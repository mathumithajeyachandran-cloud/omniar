<!DOCTYPE html>
<html>
<head>
    <title>OmniAR: Smart BIM Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; font-family: sans-serif; }
        model-viewer { width: 100%; height: 100vh; background-color: #f4f4f4; }
    </style>
</head>
<body>
    <!-- src edathula unga model file name 'omniroom.glb' nu kuduthurukaen -->
    <model-viewer 
        src="omniroom.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate>
        <button slot="ar-button" style="background: #007bff; color: white; border: none; padding: 10px 20px; border-radius: 5px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">
            🚀 START AR VIEW
        </button>
    </model-viewer>
</body>
</html>
