<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D Pro - Jumbo Hub</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0b1120; color: white; overflow-x: hidden; padding-bottom: 180px; }
        .page { display: none; width: 100vw; text-align: center; }
        .active { display: block; }
        header { background: #1e293b; padding: 40px; border-bottom: 8px solid #3b82f6; }
        h1 { font-size: 4em; color: #3b82f6; font-weight: 900; margin: 0; }

        .container { max-width: 1100px; margin: 30px auto; padding: 0 30px; }

        /* 📸 UPLOAD BOX */
        .audit-hero { background: rgba(59, 130, 246, 0.1); padding: 50px; border-radius: 40px; border: 5px dashed #3b82f6; margin-bottom: 30px; }
        .upload-btn { background: #3b82f6; color: white; border: none; padding: 25px 60px; border-radius: 100px; font-weight: 900; font-size: 1.8em; cursor: pointer; }

        /* 📊 REPORT CARDS (Month Style) */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { padding: 30px; background: #1e293b; border-radius: 25px; border-bottom: 8px solid #3b82f6; }
        .card strong { font-size: 1.1em; color: #94a3b8; text-transform: uppercase; }
        .card span { font-size: 1.8em; font-weight: 900; display: block; margin-top: 10px; color: #fff; }
        .forecast { border-color: #f59e0b; } .forecast span { color: #f59e0b; }

        /* 📈 HD CHART CARD */
        .chart-box { margin-top: 50px; background: white; padding: 50px; border-radius: 40px; height: 650px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }

        /* 📱 JUMBO NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 160px; background: #111827; display: flex; justify-content: space-around; align-items: center; border-top: 10px solid #3b82f6; z-index: 1000; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 1.5em; font-weight: 900; flex: 1; cursor: pointer; }
        .active-nav { color: #3b82f6; background: rgba(59,130,246,0.1); border-top: 8px solid #3b82f6; }
        .nav-icon { font-size: 75px; display: block; }
    </style>
</head>
<body>

    <!-- HOME PAGE -->
    <div id="home" class="page active">
        <header><h1>OMNIBUILD 5D</h1></header>
        <div class="container">
            <div class="audit-hero">
                <strong style="font-size: 2em; display: block; margin-bottom: 20px;">📸 SITE AI AUDIT</strong>
                <input type="file" id="vInp" accept="video/*" style="display: none;">
                <button class="upload-btn" onclick="document.getElementById('vInp').click()">SELECT VIDEO & SYNC</button>
                <div id="upStatus" style="display:none; margin-top:20px; font-weight:900; font-size:1.5em; color:#f59e0b;">⏳ AI SCANNING SITE...</div>
            </div>
            <div style="background:#1e293b; padding:40px; border-radius:40px; border-left:15px solid #10b981; text-align:left;">
                <h2 style="font-size:2.5em; color:#3b82f6;">System Engine Status</h2>
                <p style="font-size:1.5em;">Cloud GPU Node: <span style="color:#10b981; font-weight:900;">CONNECTED</span></p>
                <p style="font-size:1.5em;">Data Pipeline: <span style="color:#10b981; font-weight:900;">LIVE</span></p>
            </div>
        </div>
    </div>

    <!-- AR VIEW PAGE (With Floating QR) -->
    <div id="ar-view" class="page">
        <header><h1>🛡️ X-RAY VISION</h1></header>
        <!-- Floating QR Code Overlay -->
        <div style="position: absolute; top: 120px; right: 20px; background: white; padding: 15px; border-radius: 20px; border: 4px solid #3b82f6; width: 120px; z-index: 100;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://mathumithajeyachandran-cloud.github.io/omniar/" style="width: 100%;">
            <p style="color:#000; font-size:12px; font-weight:900; margin-top:5px;">SYNC BIM</p>
        </div>
        <model-viewer src="omnibuild.glb" ar camera-controls exposure="1.2" style="width:100%; height:85vh; background:#000;"></model-viewer>
    </div>

    <!-- REPORTS PAGE (With Month Style) -->
    <div id="dashboard" class="page">
        <header><h1>📉 5D REPORTS</h1></header>
        <div class="container">
            <div style="font-size: 6em; font-weight: 900; color: #10b981; margin: 30px 0;" id="perc">0%</div>
            
            <div class="stats-grid">
                <div class="card"><strong>Planned Finish</strong><span id="plan">-- --</span></div>
                <div class="card"><strong>Current Audit</strong><span id="act">-- --</span></div>
                <div class="card forecast"><strong>AI Forecast</strong><span id="eta">TBD</span></div>
            </div>

            <div class="chart-box">
                <canvas id="megaHDChart"></canvas>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="showPage('home')" id="nav-home" class="nav-item active-nav"><span class="nav-icon">🏠</span>HOME</div>
        <div onclick="showPage('ar-view')" id="nav-ar" class="nav-item"><span class="nav-icon">🛡️</span>AR SITE</div>
        <div onclick="showPage('dashboard')" id="nav-dash" class="nav-item"><span class="nav-icon">📉</span>REPORTS</div>
    </nav>

<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('nav-' + (pageId.includes('ar') ? 'ar' : pageId.includes('dash') ? 'dash' : 'home')).classList.add('active-nav');
    }

    const ctx = document.getElementById('megaHDChart').getContext('2d');
    let megaHDChart = new Chart(ctx, { 
        type: 'bar', 
        data: { labels: ['PLANNED (100%)', 'ACTUAL (%)'], datasets: [{ label: 'Status', data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'], barThickness: 180 }] },
        options: { responsive: true, maintainAspectRatio: false, devicePixelRatio: 4, scales: { y: { beginAtZero: true, max: 100, ticks: { font: { size: 25, weight: 'bold' }, color: '#000' } }, x: { ticks: { font: { size: 30, weight: '900' }, color: '#000' } } } }
    });

    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('perc').innerText = d.percentage + '%';
            document.getElementById('plan').innerText = d.planned_date || '-- --';
            document.getElementById('act').innerText = d.actual_date || '-- --';
            document.getElementById('eta').innerText = d.predicted_date || '...';
            megaHDChart.data.datasets[0].data = [100, d.percentage];
            megaHDChart.update();
        }
    });

    document.getElementById('vInp').onchange = function() {
        document.getElementById('upStatus').style.display = 'block';
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
    };
</script>
</body>
</html>
