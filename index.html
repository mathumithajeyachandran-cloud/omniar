<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - Extreme Hub</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        /* FULL SCREEN HD SETUP */
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0b1120; color: white; text-align: center; padding-bottom: 200px; }
        
        header { 
            background: linear-gradient(180deg, #1e293b 0%, #0b1120 100%); 
            padding: 80px 20px; border-bottom: 8px solid #3b82f6; 
        }
        h1 { font-size: 5em; margin: 0; letter-spacing: 5px; color: #3b82f6; font-weight: 900; text-shadow: 0 0 30px rgba(59,130,246,0.5); }
        .sub { color: #94a3b8; font-size: 1.8em; margin-top: 15px; font-weight: 700; }

        .container { max-width: 1100px; margin: 50px auto; padding: 0 30px; }

        /* 📸 GIANT AUDIT BOX */
        .audit-hero { 
            background: rgba(59, 130, 246, 0.15); padding: 80px 40px; 
            border-radius: 50px; border: 6px dashed #3b82f6; 
            margin-bottom: 60px; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .upload-btn { 
            background: #3b82f6; color: white; border: none; padding: 30px 80px; 
            border-radius: 100px; font-weight: 900; font-size: 2.2em; cursor: pointer; 
            box-shadow: 0 15px 40px rgba(59,130,246,0.5); transition: 0.3s;
        }
        .upload-btn:hover { transform: scale(1.08); background: #2563eb; }

        /* GIANT ACTION CARDS */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .card { 
            background: #1e293b; padding: 60px 40px; border-radius: 45px; 
            border: 4px solid #334155; text-decoration: none; color: white; 
            transition: 0.4s; box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }
        .card:hover { border-color: #3b82f6; transform: translateY(-20px); background: #232f45; }
        .card h2 { font-size: 2.8em; margin-top: 25px; color: #3b82f6; font-weight: 900; }

        /* 📱 EXTREME JUMBO BOTTOM NAVIGATION */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 160px; left: 0;
            background: #111827; display: flex; justify-content: space-around;
            align-items: center; border-top: 10px solid #3b82f6; z-index: 1000;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.7);
        }
        .nav-item { 
            color: #94a3b8; text-decoration: none; text-align: center; 
            font-size: 1.5em; font-weight: 900; flex: 1; padding: 20px;
        }
        .nav-item.active { color: #3b82f6; background: rgba(59,130,246,0.1); }
        .nav-icon { font-size: 70px; display: block; margin-bottom: 10px; } /* MASSIVE ICONS */

        #upStatus { margin-top: 30px; font-weight: 900; font-size: 2.2em; display: none; }
    </style>
</head>
<body>

    <header>
        <h1>OMNIBUILD 5D</h1>
        <div class="sub">Autonomous Construction OS | v2.0 Pro</div>
    </header>

    <div class="container">
        <!-- AI AUDIT ZONE -->
        <div class="audit-hero">
            <strong style="font-size: 3em; display: block; margin-bottom: 30px;">📸 SITE AI AUDIT</strong>
            <input type="file" id="vInp" accept="video/*" style="display: none;">
            <button class="upload-btn" onclick="document.getElementById('vInp').click()">SELECT VIDEO & SYNC AI</button>
            <div id="upStatus"></div>
        </div>

        <div class="grid">
            <a href="ar_view.html" class="card"><span style="font-size:100px;">🛡️</span><h2>AR SITE</h2></a>
            <a href="dashboard.html" class="card"><span style="font-size:100px;">📉</span><h2>REPORTS</h2></a>
        </div>
    </div>

    <!-- 📱 GIANT JUMBO NAV BAR -->
    <nav class="bottom-nav">
        <a href="index.html" class="nav-item active"><span class="nav-icon">🏠</span>HOME</a>
        <a href="ar_view.html" class="nav-item"><span class="nav-icon">🛡️</span>AR SITE</a>
        <a href="dashboard.html" class="nav-item"><span class="nav-icon">📉</span>REPORTS</a>
        <a href="ai_engine.html" class="nav-item"><span class="nav-icon">⚡</span>AI BRAIN</a>
    </nav>

<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const statusDiv = document.getElementById('upStatus');

    document.getElementById('vInp').onchange = function() {
        statusDiv.style.display = 'block';
        statusDiv.style.color = "#f59e0b";
        statusDiv.innerHTML = "⏳ AI CLOUD SCANNING SITE...";
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
    };

    db.ref('ai_trigger').on('value', (snap) => {
        const val = snap.val();
        if (val && val.status === "idle") {
            if (Date.now() - val.timestamp < 30000) {
                statusDiv.style.color = "#10b981";
                statusDiv.innerHTML = "✅ AI AUDIT SUCCESS!";
            }
        }
    });
</script>
</body>
</html>
