<!DOCTYPE html>
<html>
  <script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
  <!-- AR.js library download pannadhu browser-laye load aagum -->
  <script src="https://raw.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>
  
  <body style="margin : 0px; overflow: hidden;">
    <a-scene embedded arjs>
      
      <!-- Marker-ah identify panna indha line venum -->
      <a-marker preset="hiro">
        
        <!-- Unga .glb model file name-ah inga correct-ah kudunga -->
        <!-- scale kuduthu model-ah chinna or perusa maathikalam -->
        <a-entity 
          position="0 0 0" 
          scale="0.1 0.1 0.1" 
          gltf-model="my_building_model.glb">
        </a-entity>
        
      </a-marker>
      
      <a-entity camera></a-entity>
    </a-scene>
  </body>
</html>
