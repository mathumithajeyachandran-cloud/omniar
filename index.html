<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D Pro - Command Hub</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* EXTREME JUMBO UI CSS */
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0b1120; color: white; overflow: hidden; }
        
        .page { display: none; height: 100vh; width: 100vw; position: absolute; top: 0; left: 0; overflow-y: auto; padding-bottom: 180px; }
        .active { display: block; }
        
        header { background: #1e293b; padding: 40px 20px; text-align: center; border-bottom: 8px solid #3b82f6; }
        h1 { font-size: 4.5em; margin: 0; letter-spacing: 5px; color: #3b82f6; font-weight: 900; text-shadow: 0 0 30px rgba(59,130,246,0.4); }

        .container { max-width: 1100px; margin: 60px auto; padding: 0 40px; }

        /* GIANT UPLOAD BOX */
        .audit-hero { 
            background: rgba(59, 130, 246, 0.15); padding: 80px 40px; 
            border-radius: 50px; border: 6px dashed #3b82f6; 
            margin-bottom: 50px; text-align: center; box-shadow: 0 30px 60px rgba(0,0,0,0.5);
        }
        .upload-btn { 
            background: #3b82f6; color: white; border: none; padding: 30px 80px; 
            border-radius: 100px; font-weight: 900; font-size: 2.2em; cursor: pointer; 
            box-shadow: 0 15px 40px rgba(59,130,246,0.5); transition: 0.3s;
        }

        /* GIANT DASHBOARD ELEMENTS */
        .progress-bar { background: #1f2937; border-radius: 60px; height: 60px; margin: 40px 0; overflow: hidden; border: 3px solid #334155; }
        .progress-fill { background: linear-gradient(90deg, #10b981, #34d399); height: 100%; width: 0%; transition: 2s; }
        .perc-display { font-size: 6em; font-weight: 900; color: #10b981; margin: 30px 0; }

        .stats { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 40px; }
        .card { background: #1e293b; padding: 40px; border-radius: 35px; border-bottom: 10px solid #3b82f6; text-align: center; }
        .card strong { font-size: 1.5em; color: #94a3b8; text-transform: uppercase; }
        .card span { font-size: 3em; font-weight: 900; display: block; margin-top: 15px; color: white; }

        /* JUMBO BOTTOM NAV */
        .bottom-nav {
            position: fixed; bottom: 0; width: 100%; height: 150px; left: 0;
            background: #111827; display: flex; justify-content: space-around;
            align-items: center; border-top: 10px solid #3b82f6; z-index: 1000;
            box-shadow: 0 -20px 50px rgba(0,0,0,0.7);
        }
        .nav-item { color: #94a3b8; text-decoration: none; text-align: center; font-size: 1.5em; font-weight: 900; flex: 1; cursor: pointer; }
        .nav-item.active-nav { color: #3b82f6; background: rgba(59,130,246,0.1); }
        .nav-icon { font-size: 65px; display: block; margin-bottom: 10px; }

        #upStatus { margin-top: 30px; font-weight: 900; font-size: 2.5em; display: none; }
    </style>
</head>
<body>

    <!-- PAGE 1: HUB -->
    <div id="home" class="page active">
        <header><h1>OMNIBUILD 5D</h1></header>
        <div class="container">
            <div class="audit-hero">
                <strong style="font-size: 2.8em; display: block; margin-bottom: 30px;">📸 SITE AI AUDIT</strong>
                <input type="file" id="vInp" accept="video/*" style="display: none;">
                <button class="upload-btn" onclick="document.getElementById('vInp').click()">SELECT VIDEO & SYNC</button>
                <div id="upStatus">⏳ AI SCANNING SITE...</div>
            </div>
            
            <div style="padding: 40px; background: #1e293b; border-radius: 40px; border-left: 15px solid #10b981;">
                <h2 style="font-size: 2.5em; color: #3b82f6;">System Engine Status</h2>
                <p style="font-size: 1.5em;">Cloud GPU Node: <span style="color:#10b981; font-weight:900;">CONNECTED</span></p>
                <p style="font-size: 1.5em;">BIM Metadata: <span style="color:#10b981; font-weight:900;">SYNCED (5D)</span></p>
            </div>
        </div>
    </div>

    <!-- PAGE 2: AR VISION -->
    <div id="ar-view" class="page">
        <header><h1>🛡️ X-RAY VISION</h1></header>
        <model-viewer src="omnibuild.glb" ar camera-controls exposure="1.2" style="width:100%; height:80vh; background:#000;">
            <button slot="ar-button" style="background:#3b82f6; color:white; border:none; padding:25px 60px; border-radius:50px; position:absolute; bottom:50px; right:50px; font-weight:900; font-size:1.8em;">🚀 START X-RAY</button>
        </model-viewer>
    </div>

    <!-- PAGE 3: REPORTS -->
    <div id="dashboard" class="page">
        <header><h1>📉 5D ANALYTICS</h1></header>
        <div class="container">
            <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
            <div class="perc-display" id="perc">0%</div>
            
            <div class="stats">
                <div class="card"><strong>Planned Date</strong><span id="plan">--</span></div>
                <div class="card"><strong>Actual Progress</strong><span id="act">--</span></div>
            </div>

            <div style="margin-top:50px; background:white; padding:40px; border-radius:40px; height:600px;">
                <canvas id="bigChart"></canvas>
            </div>
        </div>
    </div>

    <!-- 📱 MEGA JUMBO NAVIGATION -->
    <nav class="bottom-nav">
        <div onclick="showPage('home')" id="nav-home" class="nav-item active-nav"><span class="nav-icon">🏠</span>HOME</div>
        <div onclick="showPage('ar-view')" id="nav-ar" class="nav-item"><span class="nav-icon">🛡️</span>AR SITE</div>
        <div onclick="showPage('dashboard')" id="nav-dash" class="nav-item"><span class="nav-icon">📉</span>REPORTS</div>
    </nav>

<script>
    // 1. Firebase Config
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. Navigation Logic
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('nav-' + pageId.split('-')[0]).classList.add('active-nav');
    }

    // 3. Ultra HD Chart
    const ctx = document.getElementById('bigChart').getContext('2d');
    let bigChart = new Chart(ctx, { 
        type: 'bar', 
        data: { labels: ['PLANNED', 'ACTUAL'], datasets: [{ label: '% Progress', data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'], barThickness: 150 }] },
        options: { 
            responsive: true, maintainAspectRatio: false, devicePixelRatio: 3,
            scales: { y: { beginAtZero: true, max: 100, ticks: { font: { size: 20, weight: 'bold' } } }, x: { ticks: { font: { size: 25, weight: 'bold' } } } }
        }
    });

    // 4. Data Listener
    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('fill').style.width = d.percentage + '%';
            document.getElementById('perc').innerText = d.percentage + '% COMPLETED';
            document.getElementById('plan').innerText = d.planned_days + ' Days';
            document.getElementById('act').innerText = d.actual_days + ' Days';
            bigChart.data.datasets[0].data = [100, d.percentage];
            bigChart.update();
        }
    });

    // 5. Trigger AI
    document.getElementById('vInp').onchange = function() {
        document.getElementById('upStatus').style.display = 'block';
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
    };
</script>
</body>
</html>
