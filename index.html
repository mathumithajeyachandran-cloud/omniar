<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D Pro - Jumbo App</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* EXTREME JUMBO UI - NO MORE TINY TEXT */
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0b1120; color: white; overflow-x: hidden; text-align: center; }
        .page { display: none; width: 100vw; min-height: 100vh; padding-bottom: 250px; position: absolute; top: 0; left: 0; overflow-y: auto; }
        .active { display: block; }
        
        header { background: #1e293b; padding: 60px 20px; border-bottom: 12px solid #3b82f6; }
        h1 { font-size: 6em; color: #3b82f6; font-weight: 900; margin: 0; text-transform: uppercase; letter-spacing: 5px; }

        .container { max-width: 1200px; margin: 60px auto; padding: 0 40px; }

        /* GIANT UPLOAD BUTTON */
        .audit-hero { background: rgba(59, 130, 246, 0.15); padding: 100px 50px; border-radius: 60px; border: 8px dashed #3b82f6; margin-bottom: 60px; box-shadow: 0 40px 80px rgba(0,0,0,0.6); }
        .btn-massive { background: #3b82f6; color: white; border: none; padding: 40px 100px; border-radius: 120px; font-weight: 900; font-size: 3em; cursor: pointer; transition: 0.3s; box-shadow: 0 20px 50px rgba(59,130,246,0.5); }
        
        /* HD PROGRESS DISPLAY */
        .perc-display { font-size: 10em; font-weight: 900; color: #10b981; margin: 40px 0; text-shadow: 0 0 50px rgba(16, 185, 129, 0.5); }
        .chart-box { background: white; padding: 60px; border-radius: 60px; height: 750px; margin-top: 50px; }

        /* AUDIT LOG HISTORY (Form save system) */
        .history-card { background: #1e293b; padding: 40px; border-radius: 35px; border-left: 25px solid #10b981; margin-bottom: 30px; text-align: left; border: 2px solid #334155; border-left: 20px solid #10b981; }
        .history-card strong { font-size: 2.5em; color: white; display: block; }
        .history-card span { font-size: 1.5em; color: #94a3b8; }

        /* THE JUMBO BOTTOM DOCK */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 200px; background: #111827; display: flex; justify-content: space-around; align-items: center; border-top: 10px solid #3b82f6; z-index: 1000; box-shadow: 0 -30px 60px rgba(0,0,0,0.8); }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 2.2em; font-weight: 900; flex: 1; cursor: pointer; }
        .active-nav { color: #3b82f6; background: rgba(59,130,246,0.1); }
        .nav-icon { font-size: 90px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- PAGE 1: HOME HUB -->
    <div id="home" class="page active">
        <header><h1>OMNIBUILD 5D</h1></header>
        <div class="container">
            <div class="audit-hero">
                <input type="file" id="vInp" accept="video/*" style="display: none;">
                <button class="btn-massive" onclick="document.getElementById('vInp').click()">🚀 SELECT VIDEO & SYNC</button>
                <div id="upStatus" style="margin-top:40px; font-weight:900; font-size:3em; color:#f59e0b;"></div>
            </div>
            <div style="background:#1e293b; padding:50px; border-radius:50px; text-align:left; border-left:30px solid #10b981; font-size:2em;">
                <h2>AI ENGINE: <span style="color:#10b981;">CONNECTED</span></h2>
                <p>Status: <span style="color:#3b82f6;">System Ready for Audit</span></p>
            </div>
        </div>
    </div>

    <!-- PAGE 2: AR VISION -->
    <div id="ar-view" class="page">
        <header><h1>🛡️ AR SITE VISION</h1></header>
        <model-viewer src="omnibuild.glb" ar camera-controls exposure="1.2" style="width:100%; height:80vh; background:#000;"></model-viewer>
        <div class="container">
            <h2 style="font-size:3.5em;">🕒 AR AUDIT LOGS</h2>
            <div id="ar-logs"></div>
        </div>
    </div>

    <!-- PAGE 3: HD REPORTS -->
    <div id="dashboard" class="page">
        <header><h1>📈 EXECUTIVE REPORTS</h1></header>
        <div class="container">
            <div id="perc" class="perc-display">0%</div>
            <div class="chart-box"><canvas id="ultraHDChart"></canvas></div>
            <h2 style="font-size:4em; margin-top:100px;">📜 FORM HISTORY (SAVED)</h2>
            <div id="rep-logs"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="showPage('home')" id="nav-home" class="nav-item active-nav"><span class="nav-icon">🏠</span>HOME</div>
        <div onclick="showPage('ar-view')" id="nav-ar" class="nav-item"><span class="nav-icon">🛡️</span>AR SITE</div>
        <div onclick="showPage('dashboard')" id="nav-dash" class="nav-item"><span class="nav-icon">📉</span>REPORTS</div>
    </nav>

<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(pId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(pId).classList.add('active');
        document.getElementById('nav-' + (pId.includes('ar') ? 'ar' : pId.includes('dash') ? 'dash' : 'home')).classList.add('active-nav');
        window.scrollTo(0,0);
    }

    const ctx = document.getElementById('ultraHDChart').getContext('2d');
    let ultraHDChart = new Chart(ctx, { type: 'bar', data: { labels: ['PLANNED', 'ACTUAL'], datasets: [{ data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'], barThickness: 250 }] }, options: { responsive: true, maintainAspectRatio: false, devicePixelRatio: 4, scales: { y: { ticks: { font: { size: 30, weight: 'bold' } } }, x: { ticks: { font: { size: 35, weight: 'bold' } } } } } });

    // --- AUTOMATIC HISTORY FORM LOGIC ---
    db.ref('audit_history').on('value', (snap) => {
        const logs = snap.val();
        let html = "";
        if (logs) {
            Object.keys(logs).reverse().forEach(k => {
                const item = logs[k];
                html += `<div class="history-card"><span>DATE: ${item.timestamp}</span><strong>${item.percentage}% COMPLETION - ${item.status}</strong></div>`;
            });
        }
        document.getElementById('ar-logs').innerHTML = html;
        document.getElementById('rep-logs').innerHTML = html;
    });

    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('perc').innerText = d.percentage + '%';
            ultraHDChart.data.datasets[0].data = [100, d.percentage]; ultraHDChart.update();
        }
    });

    document.getElementById('vInp').onchange = function() {
        document.getElementById('upStatus').innerText = "⏳ AI CLOUD SCANNING SITE...";
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
    };
</script>
</body>
</html>
