<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D Pro - Ultimate Hub</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* 🎨 MEGA JUMBO UI STYLE */
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0b1120; color: white; overflow-x: hidden; text-align: center; padding-bottom: 220px; }
        .page { display: none; width: 100vw; min-height: 100vh; position: absolute; top: 0; left: 0; overflow-y: auto; }
        .active { display: block; }
        header { background: #1e293b; padding: 50px; border-bottom: 12px solid #3b82f6; font-size: 3.5em; font-weight: 900; color: #3b82f6; text-transform: uppercase; }
        .container { max-width: 1200px; margin: 40px auto; padding: 0 40px; }

        /* 📸 UPLOAD HERO */
        .audit-hero { background: rgba(59, 130, 246, 0.15); padding: 80px 40px; border-radius: 60px; border: 8px dashed #3b82f6; margin-bottom: 50px; }
        .upload-btn { background: #3b82f6; color: white; border: none; padding: 30px 100px; border-radius: 120px; font-weight: 900; font-size: 2.2em; cursor: pointer; transition: 0.3s; }
        
        /* 📏 JUMBO DISTANCE LABELS */
        .hotspot { background: #3b82f6; border-radius: 50%; width: 45px; height: 45px; border: 4px solid white; cursor: pointer; box-shadow: 0 0 30px #3b82f6; }
        .annotation { 
            background: white; color: #0b1120; padding: 25px; border-radius: 25px; 
            font-size: 1.8em; font-weight: 900; position: absolute; width: 380px; 
            transform: translate(40px, -40px); display: none; text-align: left; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5); border-left: 20px solid #3b82f6; 
        }
        .hotspot:hover .annotation { display: block; }

        /* 📊 REPORTS & STATS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 40px; }
        .stat-card { padding: 35px; background: #1e293b; border-radius: 30px; border-bottom: 10px solid #3b82f6; }
        .stat-card strong { font-size: 1.2em; color: #94a3b8; text-transform: uppercase; }
        .stat-card span { font-size: 2.2em; font-weight: 900; display: block; margin-top: 15px; color: white; }

        /* 📜 AUDIT LIST */
        .history-item { background: #1e293b; padding: 40px; border-radius: 40px; margin-bottom: 25px; text-align: left; border: 1px solid #334155; border-left: 20px solid #10b981; font-size: 1.8em; }

        /* 📱 JUMBO BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 180px; background: #111827; display: flex; justify-content: space-around; align-items: center; border-top: 10px solid #3b82f6; z-index: 1000; box-shadow: 0 -30px 60px rgba(0,0,0,0.8); }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 1.8em; font-weight: 900; flex: 1; cursor: pointer; }
        .active-nav { color: #3b82f6; background: rgba(59,130,246,0.1); border-top: 8px solid #3b82f6; }
        .nav-icon { font-size: 80px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- HUB PAGE -->
    <div id="home" class="page active">
        <header>OMNIBUILD 5D</header>
        <div class="container">
            <div class="audit-hero">
                <input type="file" id="vInp" accept="video/*" style="display: none;">
                <button class="upload-btn" onclick="document.getElementById('vInp').click()">🚀 START SITE AUDIT</button>
                <div id="upStatus" style="margin-top:40px; font-weight:900; font-size:2.5em; color:#f59e0b;"></div>
            </div>
            <div style="background:#1e293b; padding:50px; border-radius:50px; border-left:30px solid #10b981; text-align:left;">
                <h2 style="font-size: 3em; color: #3b82f6; margin:0;">AI ENGINE: <span style="color:#10b981;">SYNCED</span></h2>
                <p style="font-size: 1.8em;">Cloud GPU Accelerators Status: <strong style="color:white;">READY</strong></p>
            </div>
        </div>
    </div>

    <!-- AR VIEW (With Dynamic Measurements) -->
    <div id="ar-view" class="page">
        <header>🛡️ PRECISION AR</header>
        <div style="position: absolute; top: 120px; right: 20px; background: white; padding: 15px; border-radius: 20px; border: 4px solid #3b82f6; width: 140px; z-index: 100; text-align:center;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://mathumithajeyachandran-cloud.github.io/omniar/" style="width: 100%;">
            <p style="color:black; font-size:12px; font-weight:900;">SYNC BIM</p>
        </div>
        
        <model-viewer src="omnibuild.glb" ar camera-controls exposure="1.2" style="width:100%; height:80vh; background:#000;">
            
            <!-- 📏 DYNAMIC PIPE DOT -->
            <button class="hotspot" slot="hotspot-pipe" data-position="6m 3m 1.2m" data-normal="0m 1m 0m">
                <div class="annotation" id="ar-pipe-data">📏 Fetching Measurements...</div>
            </button>

            <!-- 📏 DYNAMIC ELECTRICAL DOT -->
            <button class="hotspot" slot="hotspot-elec" data-position="0m 3m 2.4m" data-normal="0m 1m 0m">
                <div class="annotation" id="ar-elec-data">⚡ Fetching Measurements...</div>
            </button>

        </model-viewer>
        <div style="background:#1e293b; padding:30px; border-radius:30px 30px 0 0; margin-top:-20px;">
            <p style="font-size:1.8em; font-weight:900;">BIM STANDARD: <span style="color:#10b981;">DYNAMIC SYNC ENABLED</span></p>
        </div>
    </div>

    <!-- REPORTS PAGE -->
    <div id="dashboard" class="page">
        <header>📈 5D REPORTS</header>
        <div class="container">
            <div id="perc" style="font-size: 10em; font-weight: 900; color: #10b981; margin: 40px 0;">0%</div>
            <div class="stats-grid">
                <div class="stat-card"><strong>Planned Finish</strong><span id="plan">-- --</span></div>
                <div class="stat-card"><strong>Current Audit</strong><span id="act">-- --</span></div>
                <div class="stat-card" style="border-color:#f59e0b; color:#f59e0b;"><strong>AI Forecast</strong><span id="eta">TBD</span></div>
            </div>
            <div style="margin-top:60px; background:white; padding:50px; border-radius:60px; height:800px; box-shadow: 0 30px 60px rgba(0,0,0,0.5);">
                <canvas id="masterChart"></canvas>
            </div>
            <h2 style="font-size:4em; margin-top:100px; text-align:left;">📜 AUDIT HISTORY LOG</h2>
            <div id="audit-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="showPage('home')" id="nav-home" class="nav-item active-nav"><span class="nav-icon">🏠</span>HOME</div>
        <div onclick="showPage('ar-view')" id="nav-ar" class="nav-item"><span class="nav-icon">🛡️</span>AR SITE</div>
        <div onclick="showPage('dashboard')" id="nav-dash" class="nav-item"><span class="nav-icon">📉</span>REPORTS</div>
    </nav>

<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(pId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(pId).classList.add('active');
        const navId = pId === 'home'?'nav-home': pId === 'ar-view'?'nav-ar':'nav-dash';
        document.getElementById(navId).classList.add('active-nav');
        window.scrollTo(0,0);
    }

    const ctx = document.getElementById('masterChart').getContext('2d');
    let masterChart = new Chart(ctx, { type: 'bar', data: { labels: ['PLANNED (100%)', 'ACTUAL STATE (%)'], datasets: [{ data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'], barThickness: 250, borderRadius: 25 }] }, options: { responsive: true, maintainAspectRatio: false, devicePixelRatio: 4, scales: { y: { ticks: { font: { size: 30, weight: '900' } } }, x: { ticks: { font: { size: 35, weight: '900' } } } } } });

    // --- 📏 DYNAMIC PRECISION LOGIC ---
    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('perc').innerText = d.percentage + '%';
            document.getElementById('plan').innerText = d.planned_date || '-- --';
            document.getElementById('act').innerText = d.actual_date || '-- --';
            document.getElementById('eta').innerText = d.predicted_date || '...';
            
            // 🚀 UPDATE DISTANCE TAGS AUTOMATICALLY FROM CLOUD
            document.getElementById('ar-pipe-data').innerHTML = `🛠️ <b>Plumbing Audit</b><br>📏 Length: ${d.pipe_len || '10.0m'}<br>⬆️ Height: ${d.pipe_h || '1.2m'}`;
            document.getElementById('ar-elec-label').innerHTML = `⚡ <b>Electrical Audit</b><br>📏 Length: ${d.elec_len || '12.0m'}<br>⬆️ Height: ${d.elec_h || '2.4m'}`;

            masterChart.data.datasets[0].data = [100, d.percentage]; masterChart.update();
        }
    });

    db.ref('audit_history').on('value', (snap) => {
        const logs = snap.val();
        let html = "";
        if (logs) {
            Object.keys(logs).reverse().forEach(k => {
                const item = logs[k];
                html += `<div class="history-item">DATE: ${item.timestamp} <br> <strong>Result: ${item.percentage}% Completion</strong></div>`;
            });
        }
        document.getElementById('audit-list').innerHTML = html;
    });

    document.getElementById('vInp').onchange = function() {
        document.getElementById('upStatus').innerText = "⏳ AI CLOUD SCANNING SITE...";
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
    };
</script>
</body>
</html>
