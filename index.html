<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D Pro - Jumbo Hub</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0b1120; color: white; text-align: center; padding-bottom: 180px; }
        .page { display: none; width: 100vw; min-height: 100vh; position: absolute; top: 0; left: 0; overflow-y: auto; }
        .active { display: block; }
        header { background: #1e293b; padding: 50px; border-bottom: 8px solid #3b82f6; font-size: 3.5em; font-weight: 900; color: #3b82f6; }

        .container { max-width: 1200px; margin: 60px auto; padding: 0 40px; }

        /* ⚡ SYSTEM STATUS CARD */
        .status-card { padding: 50px; background: #1e293b; border-radius: 40px; border-left: 30px solid #10b981; margin-bottom: 50px; text-align: left; }

        /* 🚀 MAIN PORTAL GRID (Bigger and Better) */
        .portal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .giant-card { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 80px 40px; border-radius: 50px; border: 4px solid #334155; cursor: pointer; transition: 0.4s; }
        .giant-card:hover { transform: translateY(-15px); border-color: #3b82f6; }
        .giant-icon { font-size: 130px; display: block; margin-bottom: 20px; }
        
        /* THE AI BRAIN PORTAL (Direct link to audit) */
        .brain-portal { grid-column: span 2; background: rgba(245, 158, 11, 0.1); border: 4px dashed #f59e0b; border-radius: 50px; padding: 60px; margin-top: 40px; }

        /* 📱 JUMBO BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 160px; background: #111827; display: flex; justify-content: space-around; align-items: center; border-top: 10px solid #3b82f6; z-index: 1000; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 1.8em; font-weight: 900; flex: 1; cursor: pointer; }
        .active-nav { color: #3b82f6; background: rgba(59,130,246,0.1); }
        .nav-icon { font-size: 80px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- PORTAL 1: HUB -->
    <div id="home" class="page active">
        <header>OMNIBUILD 5D</header>
        <div class="container">
            <div class="status-card">
                <h2 style="font-size: 3em; color: #3b82f6; margin:0;">System Engine Status</h2>
                <p style="font-size: 2em; margin: 15px 0;">Cloud GPU Node: <span style="color:#10b981; font-weight:900;">CONNECTED</span></p>
            </div>

            <div class="portal-grid">
                <!-- Direct AR Site -->
                <div class="giant-card" onclick="showPage('ar-view')"><span class="giant-icon">🛡️</span><h2 style="font-size:2.5em; color:#3b82f6;">AR SITE</h2></div>
                <!-- Direct Reports -->
                <div class="giant-card" onclick="showPage('dashboard')"><span class="giant-icon">📊</span><h2 style="font-size:2.5em; color:#3b82f6;">REPORTS</h2></div>
                
                <!-- 🧠 BIG AUDIT BUTTON (Redirect to Brain tab) -->
                <div class="brain-portal" onclick="showPage('ai-engine')">
                    <span style="font-size: 80px;">🧠</span>
                    <h2 style="font-size: 2.8em; color: #f59e0b;">RUN NEW SITE AUDIT</h2>
                    <p style="font-size: 1.5em; color:#94a3b8;">Click here to upload video and start AI tracking</p>
                </div>
            </div>
        </div>
    </div>

    <!-- (Other pages ar-view, dashboard, ai-engine will be here - keeping logic same) -->

    <nav class="bottom-nav">
        <div onclick="showPage('home')" id="nav-home" class="nav-item active-nav"><span class="nav-icon">🏠</span>HOME</div>
        <div onclick="showPage('ar-view')" id="nav-ar" class="nav-item"><span class="nav-icon">🛡️</span>AR SITE</div>
        <div onclick="showPage('dashboard')" id="nav-dash" class="nav-item"><span class="nav-icon">📈</span>REPORTS</div>
        <div onclick="showPage('ai-engine')" id="nav-ai" class="nav-item"><span class="nav-icon">⚡</span>AI BRAIN</div>
    </nav>

<script>
    // Navigation logic
    function showPage(pId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(pId).classList.add('active');
        const navId = pId === 'home' ? 'nav-home' : pId === 'ar-view' ? 'nav-ar' : pId === 'dashboard' ? 'nav-dash' : 'nav-ai';
        document.getElementById(navId).classList.add('active-nav');
        window.scrollTo(0,0);
    }
    // (Add Firebase logic here as before)
</script>
</body>
</html>
