<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D Pro - Jumbo Hub</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        /* EXTREME JUMBO STYLE */
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0b1120; color: white; overflow-x: hidden; padding-bottom: 180px; }
        .page { display: none; width: 100vw; text-align: center; }
        .active { display: block; }
        
        header { background: #1e293b; padding: 40px; border-bottom: 8px solid #3b82f6; }
        h1 { font-size: 4em; color: #3b82f6; font-weight: 900; margin: 0; text-shadow: 0 0 30px rgba(59,130,246,0.5); }

        .container { max-width: 1100px; margin: 40px auto; padding: 0 30px; }

        /* 📸 UPLOAD SECTION */
        .audit-hero { background: rgba(59, 130, 246, 0.1); padding: 50px; border-radius: 40px; border: 5px dashed #3b82f6; margin-bottom: 30px; }
        .upload-btn { background: #3b82f6; color: white; border: none; padding: 25px 60px; border-radius: 100px; font-weight: 900; font-size: 1.8em; cursor: pointer; }
        #upStatus { margin-top: 20px; font-weight: 900; font-size: 1.5em; }

        /* ⚡ ENGINE STATUS CARD */
        .status-card { padding: 40px; background: #1e293b; border-radius: 40px; border-left: 20px solid #10b981; margin-bottom: 40px; text-align: left; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }

        /* 🚀 MAIN PORTAL GRID (BELOW STATUS) */
        .portal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .giant-card { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 70px 40px; border-radius: 50px; border: 4px solid #334155; cursor: pointer; transition: 0.4s; }
        .giant-card:hover { transform: translateY(-15px); border-color: #3b82f6; box-shadow: 0 30px 60px rgba(59,130,246,0.3); }
        .giant-icon { font-size: 110px; display: block; margin-bottom: 20px; }

        /* 📊 MONTH STYLE REPORT CARDS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { padding: 25px; background: #1e293b; border-radius: 20px; border-bottom: 6px solid #3b82f6; }
        .card strong { font-size: 0.9em; color: #94a3b8; text-transform: uppercase; }
        .card span { font-size: 1.8em; font-weight: 900; display: block; margin-top: 10px; }

        /* 📱 JUMBO BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 150px; background: #111827; display: flex; justify-content: space-around; align-items: center; border-top: 10px solid #3b82f6; z-index: 1000; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 1.3em; font-weight: 900; flex: 1; cursor: pointer; }
        .active-nav { color: #3b82f6; background: rgba(59,130,246,0.1); border-top: 8px solid #3b82f6; }
        .nav-icon { font-size: 65px; display: block; }
    </style>
</head>
<body>

    <!-- PAGE 1: HOME HUB -->
    <div id="home" class="page active">
        <header><h1>OMNIBUILD 5D</h1></header>
        <div class="container">
            <!-- 1. Audit Upload -->
            <div class="audit-hero">
                <strong style="font-size: 2em; display: block; margin-bottom: 20px;">📸 SITE AI AUDIT</strong>
                <input type="file" id="vInp" accept="video/*" style="display: none;">
                <button class="upload-btn" onclick="document.getElementById('vInp').click()">SELECT VIDEO & SYNC</button>
                <div id="upStatus"></div>
            </div>

            <!-- 2. System Status -->
            <div class="status-card">
                <h2 style="font-size: 2.5em; color: #3b82f6; margin:0;">System Engine Status</h2>
                <p style="font-size: 1.5em; margin: 10px 0;">Cloud GPU: <span style="color:#10b981; font-weight:900;">CONNECTED</span> | BIM Meta: <span style="color:#10b981; font-weight:900;">SYNCED</span></p>
            </div>

            <!-- 3. Portals (BELOW STATUS) -->
            <div class="portal-grid">
                <div class="giant-card" onclick="showPage('ar-view')">
                    <span class="giant-icon">🛡️</span>
                    <h2 style="font-size:2.5em; color:#3b82f6; margin:0;">AR SITE</h2>
                </div>
                <div class="giant-card" onclick="showPage('dashboard')">
                    <span class="giant-icon">📈</span>
                    <h2 style="font-size:2.5em; color:#3b82f6; margin:0;">REPORTS</h2>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGE 2: AR VIEW (With QR Overlay) -->
    <div id="ar-view" class="page">
        <header><h1>🛡️ X-RAY VISION</h1></header>
        <!-- Floating QR Code -->
        <div style="position: absolute; top: 120px; right: 20px; background: white; padding: 10px; border-radius: 15px; border: 3px solid #3b82f6; width: 100px; z-index: 100;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://mathumithajeyachandran-cloud.github.io/omniar/" style="width: 100%;">
            <p style="color:#000; font-size:10px; font-weight:900; margin-top:5px;">SYNC QR</p>
        </div>
        <model-viewer src="omnibuild.glb" ar camera-controls exposure="1.2" style="width:100%; height:85vh; background:#000;"></model-viewer>
    </div>

    <!-- PAGE 3: REPORTS (Month Style + HD Chart) -->
    <div id="dashboard" class="page">
        <header><h1>📉 5D REPORTS</h1></header>
        <div class="container">
            <div style="font-size: 5em; font-weight: 900; color: #10b981; margin: 30px 0;" id="perc">0%</div>
            
            <!-- MONTH STYLE BOXES -->
            <div class="stats-grid">
                <div class="card"><strong>Planned Finish</strong><span id="plan">-- --</span></div>
                <div class="card"><strong>Current Audit</strong><span id="act">-- --</span></div>
                <div class="card" style="border-color:#f59e0b; color:#f59e0b;"><strong>AI Forecast</strong><span id="eta">TBD</span></div>
            </div>

            <!-- HD CHART -->
            <div style="margin-top:40px; background:white; padding:40px; border-radius:40px; height:600px;">
                <canvas id="ultraHDChart"></canvas>
            </div>
        </div>
    </div>

    <!-- BOTTOM NAV -->
    <nav class="bottom-nav">
        <div onclick="showPage('home')" id="nav-home" class="nav-item active-nav"><span class="nav-icon">🏠</span>HOME</div>
        <div onclick="showPage('ar-view')" id="nav-ar" class="nav-item"><span class="nav-icon">🛡️</span>AR SITE</div>
        <div onclick="showPage('dashboard')" id="nav-dash" class="nav-item"><span class="nav-icon">📉</span>REPORTS</div>
    </nav>

<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('nav-' + (pageId.includes('ar') ? 'ar' : pageId.includes('dash') ? 'dash' : 'home')).classList.add('active-nav');
        window.scrollTo(0,0);
    }

    const ctx = document.getElementById('ultraHDChart').getContext('2d');
    let ultraHDChart = new Chart(ctx, { type: 'bar', data: { labels: ['PLANNED', 'ACTUAL'], datasets: [{ data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'], barThickness: 180 }] }, options: { responsive: true, maintainAspectRatio: false, devicePixelRatio: 3, scales: { y: { beginAtZero: true, max: 100, ticks: { font: { size: 20, weight: 'bold' } } }, x: { ticks: { font: { size: 25, weight: '900' } } } } } });

    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('perc').innerText = d.percentage + '%';
            document.getElementById('plan').innerText = d.planned_date || '-- --';
            document.getElementById('act').innerText = d.actual_date || '-- --';
            document.getElementById('eta').innerText = d.predicted_date || '...';
            ultraHDChart.data.datasets[0].data = [100, d.percentage]; ultraHDChart.update();
        }
    });

    document.getElementById('vInp').onchange = function() {
        document.getElementById('upStatus').style.display = 'block';
        document.getElementById('upStatus').style.color = "#f59e0b";
        document.getElementById('upStatus').innerText = "⏳ AI CLOUD SCANNING SITE...";
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
    };

    db.ref('ai_trigger').on('value', (snap) => {
        if (snap.val() && snap.val().status === "idle") {
            document.getElementById('upStatus').style.color = "#10b981";
            document.getElementById('upStatus').innerText = "✅ AI AUDIT SUCCESS!";
        }
    });
</script>
</body>
</html>
