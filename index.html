<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D Pro - Ultimate Jumbo Hub</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0b1120; color: white; overflow-x: hidden; text-align: center; padding-bottom: 250px; }
        .page { display: none; width: 100vw; min-height: 100vh; position: absolute; top: 0; left: 0; overflow-y: auto; }
        .active { display: block; }
        header { background: #1e293b; padding: 50px; border-bottom: 12px solid #3b82f6; font-size: 3.5em; font-weight: 900; color: #3b82f6; }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 40px; }

        /* 📸 UPLOAD SECTION */
        .audit-hero { background: rgba(59, 130, 246, 0.15); padding: 80px 40px; border-radius: 60px; border: 8px dashed #3b82f6; margin-bottom: 50px; }
        .upload-btn { background: #3b82f6; color: white; border: none; padding: 30px 80px; border-radius: 120px; font-weight: 900; font-size: 2.2em; cursor: pointer; }
        
        /* ⚡ STATUS CARD */
        .status-card { padding: 40px; background: #1e293b; border-radius: 40px; border-left: 25px solid #10b981; text-align: left; margin-bottom: 50px; }

        /* 🚀 JUMBO ACTION CARDS */
        .portal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; }
        .giant-card { background: linear-gradient(135deg, #1e293b, #0f172a); padding: 70px 40px; border-radius: 50px; border: 6px solid #334155; cursor: pointer; transition: 0.3s; }
        .giant-card:hover { transform: translateY(-15px); border-color: #3b82f6; }
        .giant-icon { font-size: 120px; display: block; margin-bottom: 20px; }

        /* 📊 MONTH STYLE CARDS */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 40px; }
        .stat-card { padding: 35px; background: #1e293b; border-radius: 30px; border-bottom: 10px solid #3b82f6; }
        .stat-card strong { font-size: 1.2em; color: #94a3b8; text-transform: uppercase; }
        .stat-card span { font-size: 2.2em; font-weight: 900; display: block; margin-top: 15px; color: white; }

        /* 📈 HD CHART CARD */
        .chart-box { background: white; padding: 50px; border-radius: 50px; height: 750px; margin-top: 60px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); }

        /* 📸 AR FLOATING QR */
        .qr-box { position: absolute; top: 120px; right: 30px; background: white; padding: 15px; border-radius: 25px; border: 5px solid #3b82f6; width: 140px; z-index: 100; text-align: center; }

        /* 📱 JUMBO BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 180px; background: #111827; display: flex; justify-content: space-around; align-items: center; border-top: 10px solid #3b82f6; z-index: 1000; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 1.8em; font-weight: 900; flex: 1; cursor: pointer; }
        .active-nav { color: #3b82f6; background: rgba(59,130,246,0.1); }
        .nav-icon { font-size: 80px; display: block; margin-bottom: 10px; }
    </style>
</head>
<body>

    <!-- PORTAL 1: MAIN HUB -->
    <div id="home" class="page active">
        <header>OMNIBUILD 5D</header>
        <div class="container">
            <div class="audit-hero">
                <input type="file" id="vInp" accept="video/*" style="display: none;">
                <button class="upload-btn" onclick="document.getElementById('vInp').click()">🚀 SELECT VIDEO & SYNC</button>
                <div id="upStatus" style="margin-top:30px; font-weight:900; font-size:2.5em; color:#f59e0b;"></div>
            </div>

            <div class="status-card">
                <h2 style="font-size: 3em; color: #3b82f6; margin:0;">System Engine Status</h2>
                <p style="font-size: 2em; margin: 15px 0;">Cloud GPU: <span style="color:#10b981; font-weight:900;">CONNECTED</span> | BIM 5D: <span style="color:#10b981; font-weight:900;">ACTIVE</span></p>
            </div>

            <div class="portal-grid">
                <div class="giant-card" onclick="showPage('ar-view')"><span class="giant-icon">🛡️</span><h2>AR SITE</h2></div>
                <div class="giant-card" onclick="showPage('dashboard')"><span class="giant-icon">📊</span><h2>REPORTS</h2></div>
            </div>
        </div>
    </div>

    <!-- PORTAL 2: AR VISION (With QR Code) -->
    <div id="ar-view" class="page">
        <header>🛡️ X-RAY VISION</header>
        <div class="qr-box">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://mathumithajeyachandran-cloud.github.io/omniar/" style="width: 100%;">
            <p style="color:black; font-size:12px; font-weight:900; margin:5px 0;">SCAN FOR BIM</p>
        </div>
        <model-viewer src="omnibuild.glb" ar camera-controls exposure="1.2" style="width:100%; height:85vh; background:#000;"></model-viewer>
    </div>

    <!-- PORTAL 3: REPORTS (Month Style + HD Chart) -->
    <div id="dashboard" class="page">
        <header>📈 5D REPORTS</header>
        <div class="container">
            <div style="font-size: 8em; font-weight: 900; color: #10b981; margin: 40px 0;" id="perc">0%</div>
            
            <div class="stats-grid">
                <div class="stat-card"><strong>Planned Finish</strong><span id="plan">-- --</span></div>
                <div class="stat-card"><strong>Current Audit</strong><span id="act">-- --</span></div>
                <div class="stat-card" style="border-color:#f59e0b; color:#f59e0b;"><strong>AI Forecast</strong><span id="eta">TBD</span></div>
            </div>

            <div class="chart-box"><canvas id="ultraHDChart"></canvas></div>
            <h2 style="font-size:4em; margin-top:80px;">🕒 AUDIT HISTORY</h2>
            <div id="audit-list"></div>
        </div>
    </div>

    <!-- NAVIGATION -->
    <nav class="bottom-nav">
        <div onclick="showPage('home')" id="nav-home" class="nav-item active-nav"><span class="nav-icon">🏠</span>HOME</div>
        <div onclick="showPage('ar-view')" id="nav-ar" class="nav-item"><span class="nav-icon">🛡️</span>AR SITE</div>
        <div onclick="showPage('dashboard')" id="nav-dash" class="nav-item"><span class="nav-icon">📈</span>REPORTS</div>
    </nav>

<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(pId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(pId).classList.add('active');
        document.getElementById('nav-' + (pId.includes('ar') ? 'ar' : pId.includes('dash') ? 'dash' : 'home')).classList.add('active-nav');
        window.scrollTo(0,0);
    }

    const ctx = document.getElementById('ultraHDChart').getContext('2d');
    let ultraHDChart = new Chart(ctx, { type: 'bar', data: { labels: ['PLANNED', 'ACTUAL'], datasets: [{ label: '% Progress', data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'], barThickness: 200 }] }, options: { responsive: true, maintainAspectRatio: false, devicePixelRatio: 4, scales: { y: { ticks: { font: { size: 25, weight: 'bold' } } }, x: { ticks: { font: { size: 30, weight: '900' } } } } } });

    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('perc').innerText = d.percentage + '%';
            document.getElementById('plan').innerText = d.planned_date || '-- --';
            document.getElementById('act').innerText = d.actual_date || '-- --';
            document.getElementById('eta').innerText = d.predicted_date || '...';
            ultraHDChart.data.datasets[0].data = [100, d.percentage]; ultraHDChart.update();
        }
    });

    db.ref('audit_history').on('value', (snap) => {
        const logs = snap.val();
        let html = "";
        if (logs) {
            Object.keys(logs).reverse().forEach(k => {
                const item = logs[k];
                html += `<div style="background:#1e293b; padding:40px; border-radius:35px; margin-bottom:20px; text-align:left; border-left:20px solid #10b981; font-size:1.8em;">DATE: ${item.timestamp} <br> <strong>Result: ${item.percentage}% - ${item.status}</strong></div>`;
            });
        }
        document.getElementById('audit-list').innerHTML = html;
    });

    document.getElementById('vInp').onchange = function() {
        document.getElementById('upStatus').innerText = "⏳ AI CLOUD SCANNING SITE...";
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
    };
</script>
</body>
</html>
