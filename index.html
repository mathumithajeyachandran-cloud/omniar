<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - Master Hub</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <!-- Firebase Library -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0f172a; color: white; text-align: center; }
        header { background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); padding: 50px 20px; border-bottom: 5px solid #3b82f6; }
        h1 { font-size: 3em; color: #3b82f6; font-weight: 900; }
        .container { max-width: 800px; margin: 30px auto; padding: 0 20px; padding-bottom: 120px; }
        .audit-hero { background: rgba(59, 130, 246, 0.1); padding: 40px; border-radius: 30px; border: 3px dashed #3b82f6; margin-bottom: 30px; }
        .upload-btn { background: #3b82f6; color: white; border: none; padding: 18px 50px; border-radius: 50px; font-weight: 900; font-size: 1.2em; cursor: pointer; }
        
        /* STATUS MESSAGES STYLING */
        #upStatus { margin-top: 20px; font-weight: 900; font-size: 1.2em; display: none; }
        .status-scanning { color: #f59e0b; } /* Orange */
        .status-success { color: #10b981; }  /* Green */

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        .card { background: #1e293b; padding: 30px; border-radius: 25px; border: 2px solid #334155; text-decoration: none; color: white; }
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 85px; left: 0; background: #1e293b; display: flex; justify-content: space-around; align-items: center; border-top: 3px solid #3b82f6; }
    </style>
</head>
<body>

    <header>
        <h1>OMNIBUILD 5D</h1>
        <p style="color:#94a3b8;">AI Site Audit & Integrated BIM Hub</p>
    </header>

    <div class="container">
        <!-- 📸 VIDEO UPLOAD ZONE -->
        <div class="audit-hero">
            <strong style="font-size: 1.5em; display: block; margin-bottom: 15px;">📸 SITE AI AUDIT</strong>
            <input type="file" id="vInp" accept="video/*" style="display: none;">
            <button class="upload-btn" onclick="document.getElementById('vInp').click()">SELECT VIDEO & SYNC AI</button>
            
            <!-- DYNAMIC STATUS MESSAGE -->
            <div id="upStatus"></div>
        </div>

        <div class="grid">
            <a href="ar_view.html" class="card"><h3>🔍 AR SITE VIEW</h3></a>
            <a href="dashboard.html" class="card"><h3>📊 LIVE REPORTS</h3></a>
        </div>
    </div>

    <script>
        // 1. Firebase Config
        const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const statusDiv = document.getElementById('upStatus');

        // 2. Upload Logic
        document.getElementById('vInp').onchange = function() {
            statusDiv.style.display = 'block';
            statusDiv.innerHTML = "<span class='status-scanning'>⏳ AI CLOUD SCANNING SITE...</span>";
            // Trigger AI Brain (Colab)
            db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
        };

        // 3. LISTEN FOR SUCCESS SIGNAL FROM CLOUD AI
        db.ref('ai_trigger').on('value', (snap) => {
            const val = snap.val();
            if (val && val.status === "idle") {
                // If timestamp exists and it was just updated (within last 30 sec)
                if (Date.now() - val.timestamp < 30000) {
                    statusDiv.innerHTML = "<span class='status-success'>✅ AI AUDIT SUCCESS! DASHBOARD UPDATED.</span>";
                    setTimeout(() => { statusDiv.style.display = 'none'; }, 5000); // 5 sec appram hide aagum
                }
            }
        });
    </script>
</body>
</html>
