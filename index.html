<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSite AR - X-Ray Analysis</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #1a1a1a; color: white; font-family: sans-serif; }
        model-viewer { width: 100%; height: 85vh; --poster-color: transparent; }
        .dashboard { padding: 15px; background: #222; border-top: 3px solid #007bff; }
        .status-tag { color: #00ff00; font-weight: bold; }
    </style>
</head>
<body>

    <!-- src-ல உங்க ஃபைல் நேம் கரெக்டா இருக்கானு பாத்துக்கோங்க -->
    <model-viewer 
        src="construction_model.glb" 
        ar 
        ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        environment-image="neutral"
        exposure="1.2"
        shadow-intensity="1">
        
        <button slot="ar-button" style="background: #007bff; color: white; border-radius: 8px; border: none; position: absolute; bottom: 20px; right: 20px; padding: 12px 20px;">
            🚀 START X-RAY AR
        </button>

    </model-viewer>

    <div class="dashboard">
        <strong>Project Status:</strong> <span class="status-tag">ACTIVE ANALYSIS</span> <br>
        <small id="data-display">Scan QR to sync Planned vs Actual Data.</small>
    </div>

</body>
</html>
