<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D Pro</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0b1120; color: white; text-align: center; }
        .page { display: none; width: 100vw; height: 100vh; overflow-y: auto; padding-bottom: 180px; position: absolute; top: 0; left: 0; }
        .active { display: block; }
        header { background: #1e293b; padding: 40px; border-bottom: 6px solid #3b82f6; font-size: 2.5em; font-weight: 900; color: #3b82f6; }
        .container { max-width: 1100px; margin: auto; padding: 20px; }
        
        /* JUMBO CARDS */
        .audit-hero { background: rgba(59, 130, 246, 0.1); padding: 50px; border-radius: 40px; border: 5px dashed #3b82f6; margin-top: 30px; }
        .btn-jumbo { background: #3b82f6; color: white; border: none; padding: 25px 80px; border-radius: 100px; font-weight: 900; font-size: 2em; cursor: pointer; }
        
        /* HD DASHBOARD */
        .perc-display { font-size: 7em; font-weight: 900; color: #10b981; margin: 30px 0; }
        .chart-box { background: white; padding: 40px; border-radius: 40px; height: 600px; margin-top: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        
        /* AUDIT LIST FORM */
        .history-item { background: #1e293b; padding: 25px; border-radius: 20px; margin-bottom: 15px; border-left: 15px solid #10b981; text-align: left; }
        
        /* BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 160px; background: #111827; display: flex; justify-content: space-around; align-items: center; border-top: 8px solid #3b82f6; z-index: 1000; }
        .nav-item { color: #555; text-decoration: none; font-size: 1.5em; font-weight: 900; flex: 1; cursor: pointer; }
        .active-nav { color: #3b82f6; }
    </style>
</head>
<body>

    <!-- PORTAL 1: HOME HUB -->
    <div id="home" class="page active">
        <header>OMNIBUILD 5D</header>
        <div class="container">
            <div class="audit-hero">
                <input type="file" id="vInp" accept="video/*" style="display: none;">
                <button class="btn-jumbo" onclick="document.getElementById('vInp').click()">SELECT VIDEO & SYNC</button>
                <div id="upStatus" style="margin-top:20px; font-weight:900; color:#f59e0b;"></div>
            </div>
            <div style="background:#1e293b; padding:40px; border-radius:30px; text-align:left; border-left:15px solid #10b981; margin-top:30px;">
                <h2>AI ENGINE STATUS: <span style="color:#10b981;">CONNECTED</span></h2>
            </div>
        </div>
    </div>

    <!-- PORTAL 2: AR VISION -->
    <div id="ar-view" class="page">
        <header>🛡️ X-RAY VISION</header>
        <div style="position: absolute; top: 120px; right: 20px; background: white; padding: 15px; border-radius: 20px; border: 4px solid #3b82f6; width: 130px; z-index: 100; text-align:center;">
            <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=https://mathumithajeyachandran-cloud.github.io/omniar/" style="width: 100%;">
            <p style="color:black; font-size:12px; font-weight:900;">SCAN FOR BIM</p>
        </div>
        <model-viewer src="omnibuild.glb" ar camera-controls exposure="1.2" style="width:100%; height:80vh;"></model-viewer>
    </div>

    <!-- PORTAL 3: HD REPORTS -->
    <div id="dashboard" class="page">
        <header>📈 5D REPORTS</header>
        <div class="container">
            <div id="perc" class="perc-display">0%</div>
            <div class="chart-box"><canvas id="hdChart"></canvas></div>
            <h2 style="margin-top:50px;">🕒 AUDIT HISTORY LOG</h2>
            <div id="history-list"></div>
        </div>
    </div>

    <nav class="bottom-nav">
        <div onclick="showPage('home')" id="nav-home" class="nav-item active-nav">🏠<br>HOME</div>
        <div onclick="showPage('ar-view')" id="nav-ar" class="nav-item">🛡️<br>AR SITE</div>
        <div onclick="showPage('dashboard')" id="nav-dash" class="nav-item">📉<br>REPORTS</div>
    </nav>

<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(pId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(pId).classList.add('active');
        document.getElementById('nav-' + (pId.includes('ar') ? 'ar' : pId.includes('dash') ? 'dash' : 'home')).classList.add('active-nav');
    }

    const ctx = document.getElementById('hdChart').getContext('2d');
    let hdChart = new Chart(ctx, { type: 'bar', data: { labels: ['PLANNED', 'ACTUAL'], datasets: [{ data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'], barThickness: 180 }] }, options: { responsive: true, maintainAspectRatio: false, devicePixelRatio: 3 } });

    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('perc').innerText = d.percentage + '%';
            hdChart.data.datasets[0].data = [100, d.percentage]; hdChart.update();
        }
    });

    db.ref('audit_history').on('value', (snap) => {
        const hData = snap.val();
        let listHtml = "";
        if (hData) {
            Object.keys(hData).reverse().forEach(key => {
                const item = hData[key];
                listHtml += `<div class="history-item"><span>${item.timestamp}</span><br><strong>Status: ${item.status} (${item.percentage}%)</strong></div>`;
            });
        }
        document.getElementById('history-list').innerHTML = listHtml;
    });

    document.getElementById('vInp').onchange = function() {
        document.getElementById('upStatus').innerText = "⏳ AI SCANNING SITE...";
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
    };
</script>
</body>
</html>
