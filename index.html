<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D Pro - Jumbo Hub</title>
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@800;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>

    <style>
        body { font-family: 'Inter', sans-serif; margin: 0; background: #0b1120; color: white; overflow-x: hidden; padding-bottom: 180px; }
        .page { display: none; width: 100vw; }
        .active { display: block; }
        
        header { background: #1e293b; padding: 50px 20px; text-align: center; border-bottom: 10px solid #3b82f6; }
        h1 { font-size: 5em; margin: 0; letter-spacing: 5px; color: #3b82f6; font-weight: 900; text-shadow: 0 0 30px rgba(59,130,246,0.5); }

        .container { max-width: 1200px; margin: 40px auto; padding: 0 40px; }

        /* 📸 GIANT AUDIT BOX */
        .audit-hero { 
            background: rgba(59, 130, 246, 0.1); padding: 70px 40px; 
            border-radius: 50px; border: 6px dashed #3b82f6; 
            margin-bottom: 40px; text-align: center;
        }
        .upload-btn { 
            background: #3b82f6; color: white; border: none; padding: 30px 80px; 
            border-radius: 100px; font-weight: 900; font-size: 2.2em; cursor: pointer; transition: 0.3s;
        }

        /* ⚡ ENGINE STATUS CARD */
        .status-card { 
            padding: 40px; background: #1e293b; border-radius: 40px; 
            border-left: 20px solid #10b981; margin-bottom: 50px; text-align: left;
        }

        /* 🚀 GIANT MAIN PORTALS (The part you requested) */
        .portal-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 40px; margin-top: 40px; }
        .giant-card { 
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%); 
            padding: 80px 40px; border-radius: 50px; border: 5px solid #334155; 
            text-align: center; cursor: pointer; transition: 0.4s; text-decoration: none; color: inherit;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
        }
        .giant-card:hover { transform: translateY(-20px); border-color: #3b82f6; box-shadow: 0 30px 60px rgba(59,130,246,0.3); }
        .giant-icon { font-size: 130px; display: block; margin-bottom: 30px; }
        .giant-card h2 { font-size: 3.5em; font-weight: 900; margin: 0; color: #3b82f6; }
        .giant-card p { font-size: 1.5em; color: #94a3b8; margin-top: 15px; }

        /* JUMBO BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 160px; background: #111827; display: flex; justify-content: space-around; align-items: center; border-top: 10px solid #3b82f6; z-index: 1000; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 1.5em; font-weight: 900; flex: 1; cursor: pointer; }
        .active-nav { color: #3b82f6; }
        .nav-icon { font-size: 75px; display: block; }
    </style>
</head>
<body>

    <!-- PAGE 1: HUB (Main Content) -->
    <div id="home" class="page active">
        <header><h1>OMNIBUILD 5D</h1></header>
        
        <div class="container">
            <!-- 1. Upload Section -->
            <div class="audit-hero">
                <strong style="font-size: 2.5em; display: block; margin-bottom: 20px;">📸 SITE AI AUDIT</strong>
                <input type="file" id="vInp" accept="video/*" style="display: none;">
                <button class="upload-btn" onclick="document.getElementById('vInp').click()">SELECT VIDEO & SYNC</button>
            </div>

            <!-- 2. System Status (Below Upload) -->
            <div class="status-card">
                <h2 style="font-size: 3em; color: #3b82f6; margin-bottom: 10px;">System Engine Status</h2>
                <p style="font-size: 1.8em;">Cloud GPU: <span style="color:#10b981; font-weight:900;">CONNECTED</span></p>
                <p style="font-size: 1.8em;">5D Metadata: <span style="color:#10b981; font-weight:900;">SYNCED</span></p>
            </div>

            <!-- 3. GIANT PORTALS (Below Status - Jumbo Size) -->
            <div class="portal-grid">
                <div class="giant-card" onclick="showPage('ar-view')">
                    <span class="giant-icon">🛡️</span>
                    <h2>AR SITE</h2>
                    <p>Launch X-Ray Vision</p>
                </div>

                <div class="giant-card" onclick="showPage('dashboard')">
                    <span class="giant-icon">📈</span>
                    <h2>REPORTS</h2>
                    <p>View 5D Analytics</p>
                </div>
            </div>
        </div>
    </div>

    <!-- PAGE 2: AR VIEW -->
    <div id="ar-view" class="page">
        <header><h1>🛡️ X-RAY VISION</h1></header>
        <model-viewer src="omnibuild.glb" ar camera-controls exposure="1.2" style="width:100%; height:85vh; background:#000;">
            <button slot="ar-button" style="background:#3b82f6; color:white; border:none; padding:30px 70px; border-radius:100px; position:absolute; bottom:80px; left:50%; transform:translateX(-50%); font-weight:900; font-size:2em; box-shadow: 0 10px 30px rgba(0,0,0,0.5);">🚀 LAUNCH AUDIT</button>
        </model-viewer>
    </div>

    <!-- PAGE 3: REPORTS -->
    <div id="dashboard" class="page">
        <header><h1>📈 5D REPORTS</h1></header>
        <div class="container" style="text-align: center;">
            <div style="font-size: 6em; font-weight: 900; color: #10b981; margin: 40px 0;" id="perc">0%</div>
            <div style="height: 600px; background:white; padding:40px; border-radius:50px;">
                <canvas id="megaChart"></canvas>
            </div>
        </div>
    </div>

    <!-- 📱 GIANT BOTTOM NAV -->
    <nav class="bottom-nav">
        <div onclick="showPage('home')" id="nav-home" class="nav-item active-nav"><span class="nav-icon">🏠</span>HOME</div>
        <div onclick="showPage('ar-view')" id="nav-ar" class="nav-item"><span class="nav-icon">🛡️</span>AR SITE</div>
        <div onclick="showPage('dashboard')" id="nav-dash" class="nav-item"><span class="nav-icon">📈</span>REPORTS</div>
    </nav>

<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active-nav'));
        document.getElementById(pageId).classList.add('active');
        document.getElementById('nav-' + (pageId.includes('ar') ? 'ar' : pageId.includes('dash') ? 'dash' : 'home')).classList.add('active-nav');
        window.scrollTo(0,0);
    }

    const ctx = document.getElementById('megaChart').getContext('2d');
    let megaChart = new Chart(ctx, { 
        type: 'bar', 
        data: { labels: ['PLANNED', 'ACTUAL'], datasets: [{ data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'], barThickness: 180 }] },
        options: { responsive: true, maintainAspectRatio: false, devicePixelRatio: 4, scales: { y: { beginAtZero: true, max: 100, ticks: { font: { size: 25, weight: 'bold' } } }, x: { ticks: { font: { size: 30, weight: 'bold' } } } } }
    });

    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('perc').innerText = d.percentage + '%';
            megaChart.data.datasets[0].data = [100, d.percentage];
            megaChart.update();
        }
    });

    document.getElementById('vInp').onchange = function() {
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
        alert("Site Video Sent for Cloud AI Audit!");
    };
</script>
</body>
</html>
