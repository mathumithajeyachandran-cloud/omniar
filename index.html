<!DOCTYPE html>
<html>
<head>
    <title>OmniSite AR: Full Home Viewer</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/3.4.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #222222; } /* Background-ah Dark Gray-ah mathirukaen */
        model-viewer { width: 100%; height: 100vh; }
    </style>
</head>
<body>
    <model-viewer 
        src="omniroom.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate
        environment-image="neutral">
        
        <button slot="ar-button" style="background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 5px; position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);">
            🚀 START AR (X-RAY VIEW)
        </button>
    </model-viewer>
</body>
</html>
