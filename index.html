<!DOCTYPE html>
<html>
<head>
    <title>OmniSite AI: Hybrid BIM</title>
    <script type="module" src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js"></script>
    <style>
        body { margin: 0; background-color: #222222; }
        model-viewer { width: 100%; height: 100vh; }
        .ar-btn {
            background: #007bff; color: white; border: none; 
            padding: 15px 30px; border-radius: 30px; 
            position: absolute; bottom: 30px; left: 50%; 
            transform: translateX(-50%); font-weight: bold; cursor: pointer;
        }
    </style>
</head>
<body>
    <model-viewer 
        src="omniroom.glb" 
        ar ar-modes="webxr scene-viewer quick-look" 
        camera-controls 
        shadow-intensity="1" 
        auto-rotate>
        <button slot="ar-button" class="ar-btn">🚀 START AR (X-RAY VIEW)</button>
    </model-viewer>
</body>
</html>
