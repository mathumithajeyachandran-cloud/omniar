<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - HD Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #f8fafc; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: white; padding: 40px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.1); border-top: 10px solid #3b82f6; }
        .progress-fill { background: linear-gradient(90deg, #10b981, #34d399); height: 100%; width: 0%; transition: width 2s ease; }
        .progress-bar { background: #e2e8f0; border-radius: 50px; height: 40px; overflow: hidden; margin: 20px 0; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 30px; }
        .card { padding: 20px; background: #f1f5f9; border-radius: 15px; border-bottom: 4px solid #3b82f6; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏗️ OmniBuild 5D Analysis</h1>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <h2 id="perc">0% Completed</h2>
        <div class="stats-grid">
            <div class="card"><strong>Planned Target</strong><br><span id="plan">-- Days</span></div>
            <div class="card"><strong>Actual Progress</strong><br><span id="act">-- Days</span></div>
        </div>
        <h3 id="status" style="margin-top:20px; color:#3b82f6;">🔄 Syncing with Site AI...</h3>
        <div style="height: 400px; margin-top: 20px;"><canvas id="v2Chart"></canvas></div>
    </div>
    <div class="card" style="border-bottom: 5px solid #ff9800;">
    <strong>AI Predicted Finish</strong>
    <span id="predicted_date" style="color: #ff9800;">Calculating...</span>
</div>
    <script>
        const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ctx = document.getElementById('v2Chart').getContext('2d');
        let v2Chart = new Chart(ctx, { type: 'bar', data: { labels: ['PLANNED (100%)', 'ACTUAL PROGRESS'], datasets: [{ data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'] }] }, options: { responsive: true, maintainAspectRatio: false } });
        db.ref('construction_progress').on('value', (snap) => {
            const data = snap.val();
            if(data) {
                document.getElementById('fill').style.width = data.percentage + '%';
                document.getElementById('perc').innerText = data.percentage + '% Completed';
                document.getElementById('plan').innerText = data.planned_days + ' Days';
                document.getElementById('act').innerText = data.actual_days + ' Days';
                document.getElementById('status').innerText = "Status: " + data.delay_msg;
                v2Chart.data.datasets[0].data = [100, data.percentage];
                v2Chart.update();
            }
        });
    </script>
</body>
</html>
