<!-- Dashboard UI-la indha pudhu section-ah add pannunga (Buttons-ku kila) -->
<div class="card" style="margin-top:20px; border: 2px dashed #3b82f6; background: #f0f7ff;">
    <strong>📸 SITE AI AUDIT</strong>
    <p style="font-size: 0.8em; color: #64748b;">Upload Site Video for Automatic Prediction</p>
    
    <input type="file" id="videoUpload" accept="video/*" style="display: none;">
    <button onclick="document.getElementById('videoUpload').click()" 
            style="background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 10px; font-weight: bold; cursor: pointer;">
        UPLOAD & SYNC
    </button>
    
    <p id="uploadStatus" style="font-size: 0.8em; margin-top: 10px; color: #059669; font-weight: bold; display: none;">
        ⏳ AI Analyzing... Please wait.
    </p>
</div>

<script>
    // Upload Logic (Simulation for Prototype)
    document.getElementById('videoUpload').onchange = function() {
        document.getElementById('uploadStatus').style.display = 'block';
        // Logic: Real-time-la idhu server-ku video-va anuppum
        // Demo-kaaga namma Firebase-la "Start_AI" trigger-ah update pandrom
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
        
        setTimeout(() => {
            alert("AI Analysis Started in Cloud. Dashboard will update in 10 seconds!");
        }, 1000);
    };
</script>
