<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - HD Analytics</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #0b1120; color: white; text-align: center; padding: 20px; }
        .container { max-width: 900px; margin: auto; background: #161e2d; padding: 45px; border-radius: 35px; border-top: 10px solid #3b82f6; }
        .progress-bar { background: #1f2937; border-radius: 50px; height: 35px; margin: 20px 0; overflow: hidden; }
        .progress-fill { background: #10b981; height: 100%; width: 0%; transition: 2s; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; }
        .card { padding: 25px; background: #0b1120; border-radius: 20px; border-bottom: 6px solid #3b82f6; }
        .card span { font-size: 1.5em; font-weight: 900; display: block; margin-top: 10px; color: #fff; }
        .chart-box { margin-top: 40px; background: white; padding: 40px; border-radius: 30px; height: 500px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏗️ OMNIBUILD 5D PRO</h1>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <div class="stats-grid">
            <div class="card"><strong>Planned Date</strong><span id="plan">-- --</span></div>
            <div class="card"><strong>Current Audit</strong><span id="act">-- --</span></div>
            <div class="card" style="border-color:#f59e0b;"><strong>AI Forecast</strong><span id="eta" style="color:#f59e0b;">TBD</span></div>
        </div>
        <div class="chart-box"><canvas id="hdChart"></canvas></div>
    </div>
<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ctx = document.getElementById('hdChart').getContext('2d');
    let hdChart = new Chart(ctx, { type: 'bar', data: { labels: ['PLANNED (100%)', 'ACTUAL (%)'], datasets: [{ data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'] }] }, options: { responsive: true, maintainAspectRatio: false, devicePixelRatio: 4 } });
    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('fill').style.width = d.percentage + '%';
            document.getElementById('plan').innerText = d.planned_date; // Ippo "Month" theriyum
            document.getElementById('act').innerText = d.actual_date;   // Ippo "Month" theriyum
            document.getElementById('eta').innerText = d.predicted_date;
            hdChart.data.datasets[0].data = [100, d.percentage]; hdChart.update();
        }
    });
</script>
</body>
</html>
