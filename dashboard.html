<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - HD Executive Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b1120; color: white; text-align: center; padding: 20px; }
        .container { max-width: 800px; margin: auto; background: #161e2d; padding: 40px; border-radius: 35px; box-shadow: 0 30px 60px rgba(0,0,0,0.5); border-top: 8px solid #3b82f6; }
        
        h1 { font-size: 2.5em; color: #3b82f6; margin-bottom: 5px; font-weight: 900; }
        .sub { color: #94a3b8; font-size: 0.9em; margin-bottom: 30px; }

        /* Progress Section */
        .progress-bar { background: #1f2937; border-radius: 50px; height: 35px; margin: 20px 0; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #10b981, #34d399); height: 100%; width: 0%; transition: 2s; }
        .perc-val { font-size: 4em; font-weight: 900; color: #10b981; margin-bottom: 20px; }

        /* HD Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { padding: 25px; background: #0b1120; border-radius: 20px; border: 2px solid #1e293b; border-bottom: 5px solid #3b82f6; }
        .card strong { font-size: 0.8em; color: #94a3b8; text-transform: uppercase; }
        .card span { font-size: 2em; font-weight: 900; display: block; margin-top: 10px; color: #fff; }
        .forecast { border-color: #f59e0b; } .forecast span { color: #f59e0b; }

        /* White HD Chart Box */
        .chart-box { margin-top: 40px; background: #ffffff; padding: 40px; border-radius: 30px; height: 500px; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏗️ OMNIBUILD 5D PRO</h1>
        <div class="sub">High-Definition Real-time Site Analytics</div>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <div class="perc-val" id="perc">0%</div>
        <div class="stats-grid">
            <div class="card"><strong>BIM Target</strong><span id="plan">-- Days</span></div>
            <div class="card"><strong>Site Actual</strong><span id="act">-- Days</span></div>
            <div class="card forecast"><strong>AI Forecast</strong><span id="eta">TBD</span></div>
        </div>
        <div class="chart-box"><canvas id="hdChart"></canvas></div>
    </div>
<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const ctx = document.getElementById('hdChart').getContext('2d');
    let hdChart = new Chart(ctx, { 
        type: 'bar', 
        data: { labels: ['BIM TARGET (100%)', 'SITE ACTUAL (%)'], datasets: [{ label: 'Completion Status', data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'], borderRadius: 15, barThickness: 120 }] },
        options: { responsive: true, maintainAspectRatio: false, devicePixelRatio: 4, scales: { y: { beginAtZero: true, max: 100, ticks: { font: { size: 16, weight: 'bold' } } }, x: { ticks: { font: { size: 18, weight: 'bold' } } } } }
    });
    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('fill').style.width = d.percentage + '%';
            document.getElementById('perc').innerText = d.percentage + '%';
            document.getElementById('plan').innerText = d.planned_days + ' Days';
            document.getElementById('act').innerText = d.actual_days + ' Days';
            document.getElementById('eta').innerText = d.predicted_date;
            hdChart.data.datasets[0].data = [100, d.percentage]; hdChart.update();
        }
    });
</script>
</body>
</html>
