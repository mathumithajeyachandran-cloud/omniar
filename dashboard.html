<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - HD Analytics Dashboard</title>
    <!-- Fonts & Libraries -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;800&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; padding: 20px; color: white; text-align: center; }
        .container { max-width: 1000px; margin: auto; background: #1e293b; padding: 40px; border-radius: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.4); border-top: 10px solid #3b82f6; }
        
        h1 { font-size: 2.8em; color: #3b82f6; margin-bottom: 5px; font-weight: 800; }
        .sub { color: #94a3b8; margin-bottom: 30px; }

        /* Audit Upload Box */
        .audit-card { margin: 20px 0; border: 3px dashed #3b82f6; background: rgba(59, 130, 246, 0.1); padding: 25px; border-radius: 20px; }
        .upload-btn { background: #3b82f6; color: white; border: none; padding: 15px 35px; border-radius: 12px; font-weight: 800; font-size: 1.1em; cursor: pointer; transition: 0.3s; }
        .upload-btn:hover { background: #2563eb; transform: scale(1.05); }

        /* Big Progress Bar */
        .progress-bar { background: #334155; border-radius: 50px; height: 55px; margin: 30px 0; overflow: hidden; border: 2px solid #475569; }
        .progress-fill { background: linear-gradient(90deg, #10b981, #34d399); height: 100%; width: 0%; transition: width 2s ease; }
        .perc-display { font-size: 3.5em; font-weight: 800; color: #10b981; margin-bottom: 20px; }

        /* HD Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { padding: 25px; background: #0f172a; border-radius: 20px; border: 1px solid #334155; border-bottom: 5px solid #3b82f6; }
        .card strong { font-size: 1em; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        .card span { font-size: 2em; font-weight: 800; display: block; margin-top: 10px; color: #fff; }
        .predict { border-color: #f59e0b; }
        .predict span { color: #f59e0b; }

        /* HD Chart Container */
        .chart-box { margin-top: 50px; height: 550px; background: #ffffff; padding: 30px; border-radius: 25px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏗️ OMNIBUILD 5D PRO</h1>
    <div class="sub">Advanced Real-time Site Audit & AI Analytics</div>

    <!-- AI AUDIT UPLOAD -->
    <div class="audit-card">
        <strong style="font-size: 1.2em; display: block; margin-bottom: 10px;">📸 SITE AI AUDIT ENGINE</strong>
        <input type="file" id="videoUpload" accept="video/*" style="display: none;">
        <button class="upload-btn" onclick="document.getElementById('videoUpload').click()">SELECT VIDEO & SYNC AI</button>
        <p id="status" style="margin-top:15px; color:#10b981; font-weight:bold; display:none;">⏳ AI PROCESSING IN CLOUD...</p>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    <div class="perc-display" id="perc">0% COMPLETED</div>

    <div class="stats-grid">
        <div class="card"><strong>BIM Planned</strong><span id="plan">-- Days</span></div>
        <div class="card"><strong>Actual Progress</strong><span id="act">-- Days</span></div>
        <div class="card predict"><strong>AI Finish Date</strong><span id="eta">TBD</span></div>
    </div>
    
    <div class="chart-box">
        <canvas id="ultraHDChart"></canvas>
    </div>
</div>

<script>
    // 1. Firebase Logic
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // 2. Ultra-HD Chart.js Config (Labels made huge and bold)
    const ctx = document.getElementById('ultraHDChart').getContext('2d');
    let ultraHDChart = new Chart(ctx, {
        type: 'bar',
        data: { 
            labels: ['BIM TARGET (100%)', 'SITE PROGRESS (%)'], 
            datasets: [{ 
                label: 'Completion Status', 
                data: [100, 0], 
                backgroundColor: ['#3b82f6', '#10b981'],
                borderRadius: 15,
                barThickness: 150 // Thick bars for clarity
            }] 
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            plugins: { 
                legend: { labels: { font: { size: 24, weight: 'bold' }, color: '#1e293b' } } 
            },
            scales: { 
                y: { beginAtZero: true, max: 100, ticks: { font: { size: 20, weight: 'bold' }, color: '#1e293b' } },
                x: { ticks: { font: { size: 22, weight: 'bold' }, color: '#1e293b' } } 
            }
        }
    });

    // 3. Real-time Sync
    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('fill').style.width = d.percentage + '%';
            document.getElementById('perc').innerText = d.percentage + '% COMPLETED';
            document.getElementById('plan').innerText = d.planned_days + ' Days';
            document.getElementById('act').innerText = d.actual_days + ' Days';
            document.getElementById('eta').innerText = d.predicted_date || 'Calculating...';
            
            ultraHDChart.data.datasets[0].data = [100, d.percentage];
            ultraHDChart.update();
        }
    });

    // 4. Upload Trigger
    document.getElementById('videoUpload').onchange = function() {
        document.getElementById('status').style.display = 'block';
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
        alert("Video Uploaded to OmniBuild AI Cloud!");
    };
</script>
</body>
</html>
