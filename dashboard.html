<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - Pro HD Dashboard</title>
    <!-- High Res Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #0b1120; padding: 20px; color: white; text-align: center; }
        .container { 
            max-width: 1000px; margin: auto; background: #161e2d; padding: 45px; 
            border-radius: 35px; box-shadow: 0 25px 70px rgba(0,0,0,0.6); 
            border-top: 10px solid #3b82f6; 
        }
        
        h1 { font-size: 3em; font-weight: 900; color: #3b82f6; margin-bottom: 5px; letter-spacing: 1px; }
        .sub { color: #94a3b8; font-size: 1.1em; margin-bottom: 30px; font-weight: 700; }

        /* 📸 DASHED UPLOAD BOX (From Screenshot) */
        .audit-card { 
            margin: 25px 0; border: 3px dashed #3b82f6; 
            background: rgba(59, 130, 246, 0.1); padding: 35px; border-radius: 25px; 
        }
        .upload-btn { 
            background: #3b82f6; color: white; border: none; padding: 18px 50px; 
            border-radius: 50px; font-weight: 900; font-size: 1.2em; cursor: pointer; 
            box-shadow: 0 10px 25px rgba(59,130,246,0.3); transition: 0.3s;
        }
        .scan-msg { margin-top: 15px; color: #10b981; font-weight: 900; font-size: 0.9em; letter-spacing: 1px; }

        /* PROGRESS BAR */
        .progress-bar { background: #1f2937; border-radius: 50px; height: 40px; margin: 30px 0; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #10b981, #34d399); height: 100%; width: 0%; transition: width 2s ease; }
        .perc-display { font-size: 5em; font-weight: 900; color: #10b981; margin-bottom: 25px; }

        /* STATS GRID (From Screenshot) */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { padding: 30px; background: #0b1120; border-radius: 25px; border: 2px solid #1e293b; border-bottom: 5px solid #3b82f6; }
        .card strong { font-size: 1em; color: #94a3b8; text-transform: uppercase; }
        .card span { font-size: 2.2em; font-weight: 900; display: block; margin-top: 12px; color: #fff; }
        
        /* FORECAST CARD COLOR */
        .forecast { border-color: #f59e0b; }
        .forecast span { color: #f59e0b; }

        /* 📈 WHITE CHART CARD (SUPER CLEAR) */
        .chart-container { 
            margin-top: 50px; background: #ffffff; padding: 50px; border-radius: 35px; 
            height: 600px; box-shadow: 0 30px 80px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🏗️ OMNIBUILD 5D PRO</h1>
    <div class="sub">High-Definition Site Audit & Predictive AI Engine</div>

    <!-- 📸 UPLOAD SECTION -->
    <div class="audit-card">
        <strong style="font-size: 1.1em; display: block; margin-bottom: 15px;">📸 SITE AI AUDIT ENGINE</strong>
        <input type="file" id="vInp" accept="video/*" style="display: none;">
        <button class="upload-btn" onclick="document.getElementById('vInp').click()">SELECT VIDEO & SYNC AI</button>
        <div class="scan-msg">⌛ AI SCANNING SITE... UPDATING DASHBOARD</div>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    <div class="perc-display" id="perc">0%</div>

    <div class="stats-grid">
        <div class="card"><strong>BIM Target</strong><span id="plan">-- Days</span></div>
        <div class="card"><strong>Site Actual</strong><span id="act">-- Days</span></div>
        <div class="card forecast"><strong>AI Forecast</strong><span id="eta">TBD</span></div>
    </div>

    <!-- 📈 THE HD CHART -->
    <div class="chart-container">
        <canvas id="hdChart"></canvas>
    </div>
</div>

<script>
    // 1. Firebase Logic
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    // 2. EXTREME HD Chart.js (Clarity Boost)
    const ctx = document.getElementById('hdChart').getContext('2d');
    let hdChart = new Chart(ctx, {
        type: 'bar',
        data: { 
            labels: ['BIM TARGET (100%)', 'SITE ACTUAL (%)'], 
            datasets: [{ 
                label: 'Audit Status', 
                data: [100, 0], 
                backgroundColor: ['#3b82f6', '#10b981'],
                borderRadius: 20,
                barThickness: 150 
            }] 
        },
        options: { 
            responsive: true, maintainAspectRatio: false,
            devicePixelRatio: 4, // 4X SHARPNESS
            plugins: { 
                legend: { labels: { font: { size: 28, weight: '900' }, color: '#000' } } 
            },
            scales: { 
                y: { beginAtZero: true, max: 100, ticks: { font: { size: 22, weight: 'bold' }, color: '#000' } },
                x: { ticks: { font: { size: 24, weight: '900' }, color: '#000' } } 
            }
        }
    });

    // 3. Real-time Listener
    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('fill').style.width = d.percentage + '%';
            document.getElementById('perc').innerText = d.percentage + '%';
            document.getElementById('plan').innerText = d.planned_days + ' Days';
            document.getElementById('act').innerText = d.actual_days + ' Days';
            document.getElementById('eta').innerText = d.predicted_date || '...';
            hdChart.data.datasets[0].data = [100, d.percentage];
            hdChart.update();
        }
    });

    document.getElementById('vInp').onchange = function() {
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
        alert("Video uploaded to OmniBuild Cloud AI!");
    };
</script>
</body>
</html>
