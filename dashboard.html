<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - Pro AI Dashboard</title>
    <!-- High Quality Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; padding: 20px; color: white; text-align: center; }
        .container { max-width: 1000px; margin: auto; background: #1e293b; padding: 45px; border-radius: 35px; box-shadow: 0 25px 70px rgba(0,0,0,0.5); border-top: 12px solid #3b82f6; }
        
        h1 { font-size: 3em; color: #3b82f6; margin-bottom: 5px; font-weight: 900; letter-spacing: 1px; }
        .sub { color: #94a3b8; font-size: 1.2em; margin-bottom: 30px; }

        /* UPLOAD BOX (Missing Option Added Back) */
        .audit-card { margin: 25px 0; border: 3px dashed #3b82f6; background: rgba(59, 130, 246, 0.15); padding: 30px; border-radius: 25px; }
        .upload-btn { background: #3b82f6; color: white; border: none; padding: 18px 45px; border-radius: 50px; font-weight: 900; font-size: 1.2em; cursor: pointer; transition: 0.3s; box-shadow: 0 5px 15px rgba(59,130,246,0.4); }
        .upload-btn:hover { background: #2563eb; transform: scale(1.05); }

        /* Big Progress Bar */
        .progress-bar { background: #334155; border-radius: 50px; height: 60px; margin: 30px 0; overflow: hidden; border: 3px solid #475569; }
        .progress-fill { background: linear-gradient(90deg, #10b981, #34d399); height: 100%; width: 0%; transition: width 2s ease-in-out; }
        .perc-display { font-size: 4.5em; font-weight: 900; color: #10b981; margin-bottom: 25px; }

        /* HD Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 20px; }
        .card { padding: 30px; background: #0f172a; border-radius: 25px; border: 2px solid #334155; border-bottom: 6px solid #3b82f6; }
        .card strong { font-size: 1.1em; color: #94a3b8; text-transform: uppercase; letter-spacing: 2px; }
        .card span { font-size: 2.2em; font-weight: 900; display: block; margin-top: 12px; color: #fff; }
        .predict { border-color: #f59e0b; }
        .predict span { color: #f59e0b; }

        /* Crystal Clear Chart Box */
        .chart-box { margin-top: 50px; height: 600px; background: #ffffff; padding: 40px; border-radius: 30px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏗️ OMNIBUILD 5D PRO</h1>
    <div class="sub">High-Definition Site Audit & Predictive AI Engine</div>

    <!-- 📸 UPLOAD OPTION (ADDED BACK) -->
    <div class="audit-card">
        <strong style="font-size: 1.3em; display: block; margin-bottom: 15px;">📸 SITE AI AUDIT ENGINE</strong>
        <input type="file" id="videoUpload" accept="video/*" style="display: none;">
        <button class="upload-btn" onclick="document.getElementById('videoUpload').click()">SELECT VIDEO & SYNC AI</button>
        <p id="uploadStatus" style="margin-top:20px; color:#10b981; font-weight:bold; display:none; font-size: 1.1em;">⏳ AI SCANNING SITE... UPDATING DASHBOARD</p>
    </div>

    <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    <div class="perc-display" id="perc">0% COMPLETED</div>

    <div class="stats-grid">
        <div class="card"><strong>BIM Target</strong><span id="plan">-- Days</span></div>
        <div class="card"><strong>Site Actual</strong><span id="act">-- Days</span></div>
        <div class="card predict"><strong>AI Forecast</strong><span id="eta">TBD</span></div>
    </div>
    
    <div class="chart-box">
        <canvas id="ultraHDChart"></canvas>
    </div>
</div>

<script>
    // 1. Firebase Logic (Unga URL-ah mattum check pannikonga)
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    
    // 2. ULTRA-HD Chart Config (Sharpness: Max)
    const ctx = document.getElementById('ultraHDChart').getContext('2d');
    let ultraHDChart = new Chart(ctx, {
        type: 'bar',
        data: { 
            labels: ['BIM TARGET (100%)', 'SITE ACTUAL (%)'], 
            datasets: [{ 
                label: 'Audit Status', 
                data: [100, 0], 
                backgroundColor: ['#3b82f6', '#10b981'],
                borderRadius: 20,
                barThickness: 160 
            }] 
        },
        options: { 
            responsive: true, 
            maintainAspectRatio: false,
            devicePixelRatio: 2,
            plugins: { 
                legend: { labels: { font: { size: 26, weight: '900' }, color: '#1e293b' } } 
            },
            scales: { 
                y: { beginAtZero: true, max: 100, ticks: { font: { size: 22, weight: 'bold' }, color: '#1e293b' } },
                x: { ticks: { font: { size: 24, weight: '900' }, color: '#000' } } 
            }
        }
    });

    // 3. Real-time Listener
    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('fill').style.width = d.percentage + '%';
            document.getElementById('perc').innerText = d.percentage + '%';
            document.getElementById('plan').innerText = d.planned_days + ' Days';
            document.getElementById('act').innerText = d.actual_days + ' Days';
            document.getElementById('eta').innerText = d.predicted_date || '...';
            
            ultraHDChart.data.datasets[0].data = [100, d.percentage];
            ultraHDChart.update();
        }
    });

    // 4. Video Upload Trigger Logic
    document.getElementById('videoUpload').onchange = function() {
        document.getElementById('uploadStatus').style.display = 'block';
        // AI Cloud Trigger
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
        alert("Video uploaded! Triggering OmniBuild Cloud AI Engine...");
    };
</script>
</body>
</html>
