<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - Analytics Dashboard</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; padding: 20px; text-align: center; }
        .container { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 20px; box-shadow: 0 5px 20px rgba(0,0,0,0.1); }
        .progress-bar { background: #eee; border-radius: 25px; height: 40px; margin: 20px 0; overflow: hidden; }
        .progress-fill { background: #28a745; height: 100%; width: 0%; transition: width 1.5s; }
        .grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { padding: 20px; background: #f8f9fa; border-radius: 12px; border-bottom: 5px solid #007bff; }
        .predict-card { border-bottom: 5px solid #ff9800; color: #ff9800; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🏗️ OmniBuild 5D Live Analysis</h1>
        <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
        <h2 id="perc">0% Completed</h2>
        <div class="grid">
            <div class="card"><strong>Planned Target</strong><br><span id="plan">-- Days</span></div>
            <div class="card"><strong>Actual Progress</strong><br><span id="act">-- Days</span></div>
            <div class="card predict-card"><strong>AI Predicted Finish</strong><br><span id="eta">Calculating...</span></div>
        </div>
        <div style="height: 350px; margin-top: 30px;"><canvas id="chart"></canvas></div>
    </div>
    <script>
        const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const ctx = document.getElementById('chart').getContext('2d');
        let myChart = new Chart(ctx, { type: 'bar', data: { labels: ['Planned', 'Actual'], datasets: [{ label: '% Done', data: [100, 0], backgroundColor: ['#007bff', '#28a745'] }] }, options: { responsive: true, maintainAspectRatio: false } });

        db.ref('construction_progress').on('value', (snap) => {
            const d = snap.val();
            if(d) {
                document.getElementById('fill').style.width = d.percentage + '%';
                document.getElementById('perc').innerText = d.percentage + '%';
                document.getElementById('plan').innerText = d.planned_days + ' Days';
                document.getElementById('act').innerText = d.actual_days + ' Days';
                document.getElementById('eta').innerText = d.predicted_date;
                myChart.data.datasets[0].data = [100, d.percentage];
                myChart.update();
            }
        });
    </script>
</body>
</html>
