<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - Advanced Audit</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@700;900&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: white; text-align: center; padding: 20px; }
        .container { max-width: 1000px; margin: auto; background: #1e293b; padding: 40px; border-radius: 35px; border-top: 10px solid #3b82f6; }
        h1 { color: #3b82f6; font-weight: 900; margin-bottom: 5px; }
        .progress-bar { background: #334155; border-radius: 50px; height: 50px; margin: 25px 0; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #10b981, #34d399); height: 100%; width: 0%; transition: 2s; }
        
        /* Stats Grid */
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card { padding: 20px; background: #0f172a; border-radius: 20px; border-bottom: 5px solid #3b82f6; }
        .card span { font-size: 1.8em; font-weight: 900; display: block; margin-top: 10px; }

        /* VIDEO UPLOAD (Moved Below Status as requested) */
        .upload-section { margin-top: 30px; padding: 25px; border: 2px dashed #3b82f6; border-radius: 20px; background: rgba(59, 130, 246, 0.1); }
        .upload-btn { background: #3b82f6; color: white; border: none; padding: 15px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; }

        /* AI COMPARISON TABLE (New Feature) */
        .audit-details { margin-top: 30px; background: #0f172a; padding: 20px; border-radius: 20px; text-align: left; }
        .audit-row { display: flex; justify-content: space-between; padding: 10px; border-bottom: 1px solid #334155; }
        .label-green { color: #10b981; font-weight: bold; }
        .label-blue { color: #3b82f6; font-weight: bold; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏗️ OMNIBUILD 5D PRO</h1>
    <div class="progress-bar"><div class="progress-fill" id="fill"></div></div>
    <div style="font-size: 3em; font-weight: 900;" id="perc">0%</div>

    <div class="stats-grid">
        <div class="card"><strong>BIM Target</strong><span id="plan">--</span></div>
        <div class="card"><strong>Site Actual</strong><span id="act">--</span></div>
        <div class="card" style="border-color:#f59e0b;"><strong>AI Forecast</strong><span id="eta" style="color:#f59e0b;">TBD</span></div>
    </div>

    <!-- 📸 VIDEO UPLOAD (BELOW STATUS) -->
    <div class="upload-section">
        <strong>📸 AUTO-AUDIT ENGINE</strong>
        <p style="font-size: 0.8em; color: #94a3b8;">Upload video for real-time BIM comparison</p>
        <input type="file" id="vUpload" accept="video/*" style="display: none;">
        <button class="upload-btn" onclick="document.getElementById('vUpload').click()">SELECT VIDEO & SYNC</button>
    </div>

    <!-- 🤖 AI COMPARISON DETAILS (AUTOMATIC) -->
    <div class="audit-details">
        <h3 style="color: #3b82f6;">🤖 AI Comparison Analysis (v2)</h3>
        <div class="audit-row"><span>Structural Elements Planned (BIM):</span> <span class="label-blue" id="bim-count">--</span></div>
        <div class="audit-row"><span>Structural Elements Detected (AI):</span> <span class="label-green" id="ai-count">--</span></div>
        <div class="audit-row"><span>Comparison Status:</span> <span id="comp-status">Waiting for Sync...</span></div>
    </div>

    <div style="height: 400px; margin-top: 40px; background: white; padding: 20px; border-radius: 20px;">
        <canvas id="hdChart"></canvas>
    </div>
</div>

<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    const ctx = document.getElementById('hdChart').getContext('2d');
    let hdChart = new Chart(ctx, { type: 'bar', data: { labels: ['PLANNED', 'ACTUAL'], datasets: [{ data: [100, 0], backgroundColor: ['#3b82f6', '#10b981'] }] }, options: { responsive: true, maintainAspectRatio: false } });

    // Sync Logic
    db.ref('construction_progress').on('value', (snap) => {
        const d = snap.val();
        if(d) {
            document.getElementById('fill').style.width = d.percentage + '%';
            document.getElementById('perc').innerText = d.percentage + '%';
            document.getElementById('plan').innerText = d.planned_days + ' Days';
            document.getElementById('act').innerText = d.actual_days + ' Days';
            document.getElementById('eta').innerText = d.predicted_date;
            
            // AUTOMATIC COMPARISON DETAILS
            document.getElementById('bim-count').innerText = d.planned_objects + " Units";
            document.getElementById('ai-count').innerText = d.actual_objects + " Units";
            document.getElementById('comp-status').innerText = d.delay_msg;
            document.getElementById('comp-status').style.color = d.percentage < 100 ? "#ef4444" : "#10b981";

            hdChart.data.datasets[0].data = [100, d.percentage];
            hdChart.update();
        }
    });

    document.getElementById('vUpload').onchange = function() {
        db.ref('ai_trigger').set({ status: "start", timestamp: Date.now() });
        alert("Video uploaded! Cloud AI comparing Planned vs Actual...");
    };
</script>
</body>
</html>
