<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniSite AR - Consumer Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: #007bff; text-align: center; }
        .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-top: 20px; }
        .stat-card { padding: 15px; border-radius: 8px; border-left: 5px solid #007bff; background: #e9ecef; }
        .status-delayed { color: #dc3545; font-weight: bold; }
        .progress-container { margin: 25px 0; }
        .progress-bar { background: #ddd; border-radius: 20px; height: 30px; position: relative; overflow: hidden; }
        .progress-fill { background: #28a745; height: 100%; width: 0%; transition: width 1s; } /* AI result-ah inga update pannanum */
        .chart-container { margin-top: 30px; height: 300px; }
    </style>
</head>
<body>

<div class="container">
    <h1>🏗️ OmniSite Progress Tracker</h1>
    <p style="text-align: center;">BIM & AI-Powered Real-time Analysis</p>

    <div class="progress-container">
        <strong>Overall Construction Progress:</strong>
        <div class="progress-bar">
            <!-- AI result 60% na width: 60% nu maathanum -->
            <div class="progress-fill" style="width: 60%;"></div> 
        </div>
        <p style="text-align: right;">60% Completed</p>
    </div>

    <div class="stats-grid">
        <div class="stat-card">
            <strong>Planned Days (BIM):</strong><br>
            <span id="planned-days">5 Days</span>
        </div>
        <div class="stat-card">
            <strong>Actual Days (AI):</strong><br>
            <span id="actual-days">6 Days</span>
        </div>
        <div class="stat-card">
            <strong>Project Status:</strong><br>
            <span class="status-delayed">🔴 1 DAY DELAYED</span>
        </div>
        <div class="stat-card">
            <strong>Balance Work:</strong><br>
            <span>40% Work Pending</span>
        </div>
    </div>

    <div class="chart-container">
        <canvas id="progressChart"></canvas>
    </div>
</div>

<script>
    // Planned vs Actual Comparison Chart
    const ctx = document.getElementById('progressChart').getContext('2d');
    new Chart(ctx, {
        type: 'bar',
        data: {
            labels: ['Planned Work', 'Actual Work'],
            datasets: [{
                label: 'Work Percentage (%)',
                data: [100, 60], // Planned is always 100%, Actual is from AI
                backgroundColor: ['#007bff', '#28a745']
            }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });
</script>

</body>
</html>
