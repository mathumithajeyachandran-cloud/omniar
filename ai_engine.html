<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OmniBuild 5D - AI Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <style>
        body { font-family: 'Fira Code', monospace; background: #000; color: #10b981; padding: 20px; }
        header { border-bottom: 2px solid #10b981; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* 💻 HACKER TERMINAL STYLE */
        #console { height: 60vh; overflow-y: auto; background: #050505; padding: 20px; border-radius: 10px; border: 1px solid #333; font-size: 1.1em; line-height: 1.5; }
        .log-entry { margin-bottom: 5px; }
        .system { color: #f59e0b; } /* Orange */
        .success { color: #10b981; font-weight: bold; }
        
        .btn-zone { margin-top: 30px; text-align: center; }
        .launch-link { color: #10b981; text-decoration: underline; font-size: 0.9em; cursor: pointer; }

        /* JUMBO BOTTOM NAV */
        .bottom-nav { position: fixed; bottom: 0; width: 100%; height: 120px; left: 0; background: #111; display: flex; justify-content: space-around; align-items: center; border-top: 2px solid #10b981; }
        .nav-item { color: #555; text-decoration: none; text-align: center; font-size: 1.2em; font-weight: 900; flex: 1; }
        .nav-item.active { color: #10b981; }
    </style>
</head>
<body>

    <header>
        <span style="font-size: 1.5em; font-weight: 900;">⚡ OMNIBUILD AI CLOUD CONSOLE</span>
    </header>

    <!-- LIVE LOG WINDOW -->
    <div id="console">
        <div class="log-entry system">[SYSTEM]: Waiting for AI Engine activation...</div>
    </div>

    <div class="btn-zone">
        <!-- BUTTON JUST OPENS THE LINK IN BACKGROUND -->
        <p>Brain is not active? <a href="https://colab.research.google.com/drive/1c4duU-CkD7DSlzUmQazg3EBQaxpLIWbz" target="_blank" class="launch-link">Launch Backend Engine</a></p>
    </div>

    <nav class="bottom-nav">
        <a href="index.html" class="nav-item">🏠 HOME</a>
        <a href="ar_view.html" class="nav-item">🛡️ AR SITE</a>
        <a href="dashboard.html" class="nav-item">📉 REPORTS</a>
        <a href="ai_engine.html" class="nav-item active">⚡ AI BRAIN</a>
    </nav>

<script>
    const firebaseConfig = { databaseURL: "https://omniar-db-8ab03-default-rtdb.firebaseio.com/" };
    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    const consoleDiv = document.getElementById('console');

    // Firebase listener to show LIVE LOGS from Colab
    db.ref('ai_logs').on('value', (snap) => {
        const log = snap.val();
        if (log) {
            const entry = document.createElement('div');
            entry.className = 'log-entry';
            entry.innerHTML = `<span class='system'>[${new Date().toLocaleTimeString()}]:</span> ${log.message}`;
            consoleDiv.appendChild(entry);
            consoleDiv.scrollTop = consoleDiv.scrollHeight; // Auto scroll
        }
    });
</script>
</body>
</html>
